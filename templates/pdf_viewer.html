<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ paper_title or 'PDF Viewer' }} - Resophy</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/website_logo.png') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [["$", "$"], ["\\(", "\\)"]],
                displayMath: [["$$", "$$"], ["\\[", "\\]"]]
            },
            options: {
                skipHtmlTags: ["script", "noscript", "style", "textarea", "pre"],
                processHtmlClass: "md-render"
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #2c2c2c;
            color: white;
            overflow: hidden;
        }

        .header {
            background: #1a1a1a;
            border-bottom: 1px solid #444;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
        }

        .header h3 {
            margin: 0;
            font-size: 16px;
            color: white;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 50%;
        }

        .btn {
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 8px 12px;
            cursor: pointer;
            font-size: 14px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            transition: background-color 0.2s;
        }

        .btn:hover {
            background: #0056b3;
        }

        .btn-secondary {
            background: #6c757d;
        }

        .btn-secondary:hover {
            background: #545b62;
        }

        .header-right {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .chat-toggle-btn {
            background: #6c757d;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 8px 12px;
            cursor: pointer;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            transition: background-color 0.2s;
        }

        .chat-toggle-btn:hover {
            background: #545b62;
        }

        .chat-toggle-btn.active {
            background: #007bff;
        }

        .main-container {
            display: flex;
            height: calc(100vh - 60px);
            width: 100%;
        }

        .pdf-container {
            flex: 1;
            height: 100%;
            transition: all 0.3s ease;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            flex-direction: column;
            color: #ccc;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #444;
            border-top: 4px solid #007bff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Chat Sidebar */
        .chat-sidebar {
            width: 0;
            min-width: 0;
            background: #1e1e1e;
            border-left: 1px solid #444;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            transition: width 0.3s ease, min-width 0.3s ease;
        }

        .chat-sidebar.open {
            width: 420px;
            min-width: 420px;
        }

        .chat-sidebar.resizing {
            transition: none;
        }

        .chat-resize-handle {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            cursor: col-resize;
            z-index: 10;
        }

        .chat-resize-handle:hover,
        .chat-resize-handle.active {
            background: #667eea;
        }

        .chat-header {
            padding: 12px 16px;
            background: #252525;
            border-bottom: 1px solid #444;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .chat-header-title {
            font-size: 14px;
            font-weight: 600;
            color: #e0e0e0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .chat-header-title i {
            color: #007bff;
        }

        .chat-context-badge {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 10px;
            background: #1a472a;
            color: #4caf50;
            font-weight: 500;
        }

        .chat-context-badge.no-context {
            background: #4a3728;
            color: #ff9800;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .chat-message {
            max-width: 95%;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.6;
            word-wrap: break-word;
        }

        .chat-message.user {
            align-self: flex-end;
            background: #007bff;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .chat-message.assistant {
            align-self: flex-start;
            background: #333;
            color: #e0e0e0;
            border-bottom-left-radius: 4px;
        }

        .chat-message.assistant .md-content h1,
        .chat-message.assistant .md-content h2,
        .chat-message.assistant .md-content h3 {
            margin: 8px 0 4px;
            color: #fff;
            font-size: 15px;
        }

        .chat-message.assistant .md-content p {
            margin: 4px 0;
        }

        .chat-message.assistant .md-content code {
            background: #444;
            padding: 1px 4px;
            border-radius: 3px;
            font-size: 13px;
        }

        .chat-message.assistant .md-content pre {
            background: #1a1a1a;
            padding: 10px;
            border-radius: 6px;
            overflow-x: auto;
            margin: 8px 0;
        }

        .chat-message.assistant .md-content pre code {
            background: none;
            padding: 0;
        }

        .chat-message.assistant .md-content ul,
        .chat-message.assistant .md-content ol {
            margin: 4px 0;
            padding-left: 20px;
        }

        .chat-message.assistant .md-content li {
            margin: 2px 0;
        }

        .chat-message.assistant .md-content strong {
            color: #fff;
        }

        .chat-message.error {
            align-self: center;
            background: #4a2020;
            color: #ff6b6b;
            font-size: 13px;
            text-align: center;
        }

        .chat-message .typing-cursor {
            display: inline-block;
            width: 2px;
            height: 16px;
            background: #007bff;
            animation: blink 0.7s infinite;
            vertical-align: text-bottom;
            margin-left: 2px;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        .chat-welcome {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            color: #888;
            padding: 20px;
        }

        .chat-welcome i {
            font-size: 48px;
            margin-bottom: 16px;
            color: #555;
        }

        .chat-welcome p {
            font-size: 14px;
            line-height: 1.6;
            margin: 4px 0;
        }

        .chat-input-area {
            padding: 12px 16px;
            background: #252525;
            border-top: 1px solid #444;
        }

        .chat-input-wrapper {
            display: flex;
            gap: 8px;
            align-items: flex-end;
        }

        .chat-input {
            flex: 1;
            background: #333;
            border: 1px solid #555;
            border-radius: 8px;
            padding: 10px 14px;
            color: #e0e0e0;
            font-size: 14px;
            font-family: inherit;
            resize: none;
            outline: none;
            max-height: 120px;
            min-height: 40px;
            line-height: 1.5;
        }

        .chat-input:focus {
            border-color: #007bff;
        }

        .chat-input::placeholder {
            color: #777;
        }

        .chat-send-btn {
            background: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 10px 14px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s;
            min-width: 40px;
            height: 40px;
        }

        .chat-send-btn:hover {
            background: #0056b3;
        }

        .chat-send-btn:disabled {
            background: #555;
            cursor: not-allowed;
        }

        .chat-clear-btn {
            background: none;
            border: none;
            color: #888;
            cursor: pointer;
            font-size: 14px;
            padding: 4px;
            border-radius: 4px;
        }

        .chat-clear-btn:hover {
            color: #ff6b6b;
            background: #333;
        }

        /* Scrollbar for chat */
        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: #555;
            border-radius: 3px;
        }

        .chat-messages::-webkit-scrollbar-thumb:hover {
            background: #777;
        }

        /* Bilingual mode styles */
        .bilingual-active .pdf-container {
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        #bilingual-container {
            display: none;
            padding: 32px 24px;
            color: #e0e0e0;
            max-width: 1200px;
            margin: 0 auto;
        }

        .bilingual-active #bilingual-container {
            display: block;
        }

        .bilingual-active #pdf-iframe,
        .bilingual-active #loading {
            display: none !important;
        }

        .font-size-select {
            display: none;
            background: #333;
            color: #e0e0e0;
            border: 1px solid #555;
            border-radius: 4px;
            padding: 6px 8px;
            font-size: 12px;
            cursor: pointer;
            outline: none;
        }

        .font-size-select:hover {
            border-color: #777;
        }

        .font-size-select option {
            background: #222;
            color: #e0e0e0;
        }

        .bilingual-active .font-size-select {
            display: inline-block;
        }

        /* Vertical bilingual layout */
        .vertical-layout .segment {
            margin-bottom: 20px;
            border-radius: 8px;
            overflow: hidden;
        }

        .vertical-layout .original-block {
            padding: 14px 18px;
            background: #333;
            border-left: 3px solid #4a6fa5;
        }

        .vertical-layout .translated-block {
            padding: 14px 18px;
            background: #2a2020;
            border-left: 3px solid #a54a4a;
        }

        /* Markdown styles for bilingual */
        .md-render h1 { font-size: 1.6em; margin: 0.4em 0 0.2em; color: #fff; font-weight: 700; }
        .md-render h2 { font-size: 1.3em; margin: 0.6em 0 0.2em; color: #ddd; font-weight: 600; border-bottom: 1px solid #555; padding-bottom: 0.2em; }
        .md-render h3 { font-size: 1.1em; margin: 0.4em 0 0.2em; color: #ccc; font-weight: 600; }
        .md-render p { line-height: 1.7; margin-bottom: 0.6em; }
        .md-render ul, .md-render ol { margin-left: 1.5em; margin-bottom: 0.6em; line-height: 1.7; }
        .md-render li { margin-bottom: 0.2em; }
        .md-render code { padding: 2px 4px; background: #444; border-radius: 3px; font-size: 0.9em; color: #88c0d0; }
        .md-render pre { padding: 12px; background: #1a1a1a; border-radius: 6px; overflow-x: auto; margin: 0.6em 0; }
        .md-render pre code { background: none; color: #e0e0e0; padding: 0; }
        .md-render img { max-width: 100%; height: auto; border-radius: 6px; margin: 0.6em 0; }
        .md-render blockquote { margin: 0.6em 0; padding: 6px 14px; border-left: 3px solid #666; background: #222; }
        .md-render table { width: 100%; border-collapse: collapse; margin: 0.6em 0; }
        .md-render th, .md-render td { padding: 6px 10px; border: 1px solid #555; }
        .md-render th { background: #333; font-weight: 600; }
        .md-render a { color: #5b9bd5; text-decoration: none; }
        .md-render a:hover { text-decoration: underline; }
        .md-render .algorithm-block {
            padding: 12px; background: #1a1a1a; border-radius: 6px;
            overflow: auto; margin: 0.6em 0; font-family: monospace;
            font-size: 13px; line-height: 1.7; white-space: pre-wrap;
        }

        /* Light theme */
        body.light-theme {
            background: #f5f5f5;
            color: #333;
        }

        body.light-theme .header {
            background: #fff;
            border-bottom-color: #ddd;
        }

        body.light-theme .header h3 {
            color: #333;
        }

        body.light-theme .btn-secondary {
            background: #e0e0e0;
            color: #333;
        }

        body.light-theme .btn-secondary:hover {
            background: #d0d0d0;
        }

        body.light-theme .chat-toggle-btn {
            background: #e0e0e0;
            color: #333;
        }

        body.light-theme .chat-toggle-btn:hover {
            background: #d0d0d0;
        }

        body.light-theme .chat-toggle-btn.active {
            background: #007bff;
            color: white;
        }

        body.light-theme .chat-sidebar {
            background: #fff;
            border-left-color: #ddd;
        }

        body.light-theme .chat-resize-handle:hover,
        body.light-theme .chat-resize-handle.active {
            background: #667eea;
        }

        body.light-theme .chat-header {
            background: #f0f0f0;
            border-bottom-color: #ddd;
        }

        body.light-theme .chat-header-title {
            color: #333;
        }

        body.light-theme .chat-message.assistant {
            background: #e8e8e8;
            color: #333;
        }

        body.light-theme .chat-message.assistant .md-content h1,
        body.light-theme .chat-message.assistant .md-content h2,
        body.light-theme .chat-message.assistant .md-content h3 {
            color: #222;
        }

        body.light-theme .chat-message.assistant .md-content code {
            background: #d0d0d0;
            color: #333;
        }

        body.light-theme .chat-message.assistant .md-content pre {
            background: #f5f5f5;
        }

        body.light-theme .chat-message.assistant .md-content pre code {
            background: none;
            color: #333;
        }

        body.light-theme .chat-message.assistant .md-content strong {
            color: #111;
        }

        body.light-theme .chat-message.error {
            background: #ffe0e0;
            color: #c00;
        }

        body.light-theme .chat-input-area {
            background: #f0f0f0;
            border-top-color: #ddd;
        }

        body.light-theme .chat-input {
            background: #fff;
            border-color: #ccc;
            color: #333;
        }

        body.light-theme .chat-input:focus {
            border-color: #007bff;
        }

        body.light-theme .chat-input::placeholder {
            color: #999;
        }

        body.light-theme .chat-clear-btn {
            color: #999;
        }

        body.light-theme .chat-clear-btn:hover {
            color: #c00;
            background: #eee;
        }

        body.light-theme .chat-welcome {
            color: #999;
        }

        body.light-theme .chat-welcome i {
            color: #ccc;
        }

        body.light-theme .loading {
            color: #999;
        }


        body.light-theme .font-size-select {
            background: #f0f0f0;
            color: #333;
            border-color: #ccc;
        }

        body.light-theme .font-size-select option {
            background: #fff;
            color: #333;
        }

        /* Bilingual light theme */
        body.light-theme #bilingual-container {
            color: #333;
        }

        body.light-theme .vertical-layout .original-block {
            background: #f0f4f8;
            border-left-color: #4a6fa5;
        }

        body.light-theme .vertical-layout .translated-block {
            background: #f8f0f0;
            border-left-color: #a54a4a;
        }

        body.light-theme .md-render h1 { color: #111; }
        body.light-theme .md-render h2 { color: #222; border-bottom-color: #ddd; }
        body.light-theme .md-render h3 { color: #333; }
        body.light-theme .md-render code { background: #e8e8e8; color: #2a6a8a; }
        body.light-theme .md-render pre { background: #f5f5f5; }
        body.light-theme .md-render pre code { color: #333; }
        body.light-theme .md-render blockquote { background: #f0f0f0; border-left-color: #bbb; }
        body.light-theme .md-render th { background: #e8e8e8; color: #333; }
        body.light-theme .md-render th, body.light-theme .md-render td { border-color: #ddd; }
        body.light-theme .md-render a { color: #1a73e8; }
        body.light-theme .md-render .algorithm-block { background: #f5f5f5; }
    </style>
</head>
<body data-use-chinese="{{ 'true' if use_chinese else 'false' }}" data-has-bilingual="{{ 'true' if has_bilingual else 'false' }}">
    <div class="header">
        <div>
            <button id="back-btn" class="btn btn-secondary" title="Close current tab (Ctrl+W)">
                <i class="fas fa-times"></i> Close
            </button>
        </div>
        <h3 id="pdf-title">{{ paper_title or 'PDF Viewer' }}</h3>
        <div class="header-right">
            <select id="font-size-select" class="font-size-select" title="Font size">
                <option value="14">字号 14</option>
                <option value="16" selected>字号 16</option>
                <option value="18">字号 18</option>
                <option value="20">字号 20</option>
                <option value="24">字号 24</option>
            </select>
            <button id="chat-toggle-btn" class="chat-toggle-btn" title="Toggle chat sidebar">
                <i class="fas fa-comments"></i> Chat
            </button>
            <button id="theme-toggle-btn" class="chat-toggle-btn" title="Toggle light/dark mode">
                <i class="fas fa-sun" id="theme-icon"></i>
            </button>
            <a href="/api/paper/{{ paper_id }}/file" class="btn btn-secondary" download>
                <i class="fas fa-download"></i> Download
            </a>
        </div>
    </div>

    <div class="main-container">
        <div class="pdf-container">
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Loading PDF viewer...</p>
            </div>
            <iframe
                id="pdf-iframe"
                style="display: none;"
                src=""
                title="PDF Viewer">
            </iframe>
            <div id="bilingual-container"></div>
        </div>

        <div class="chat-sidebar" id="chat-sidebar">
            <div class="chat-resize-handle" id="chat-resize-handle"></div>
            <div class="chat-header">
                <div class="chat-header-title">
                    <i class="fas fa-comments"></i>
                    <span>Paper Q&A</span>
                    <span class="chat-context-badge" id="chat-context-badge" style="display:none;">Paper loaded</span>
                </div>
                <button class="chat-clear-btn" id="chat-clear-btn" title="Clear conversation">
                    <i class="fas fa-trash-alt"></i>
                </button>
            </div>
            <div class="chat-messages" id="chat-messages">
                <div class="chat-welcome" id="chat-welcome">
                    <i class="fas fa-robot"></i>
                    <p>Ask questions about this paper</p>
                    <p style="font-size: 12px; color: #666; margin-top: 8px;">
                        The AI analysis result is used as context.<br>
                        Select text and paste it here to ask about specific parts.
                    </p>
                </div>
            </div>
            <div class="chat-input-area">
                <div class="chat-input-wrapper">
                    <textarea
                        class="chat-input"
                        id="chat-input"
                        placeholder="Ask about this paper..."
                        rows="1"
                    ></textarea>
                    <button class="chat-send-btn" id="chat-send-btn" title="Send message">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const PAPER_ID = '{{ paper_id }}';
        let chatMessages = []; // {role, content}
        let isChatStreaming = false;
        let hasPaperContext = false;
        let isBilingualMode = false;
        let bilingualData = null;

        // Get paper information and set title
        async function loadPaperInfo() {
            try {
                const response = await fetch('/api/paper/' + PAPER_ID);
                if (response.ok) {
                    const paper = await response.json();
                    const resolvedTitle = paper.title || paper.filename || 'PDF Viewer';
                    const titleEl = document.getElementById('pdf-title');
                    if (titleEl) {
                        titleEl.textContent = resolvedTitle;
                    }
                    document.title = resolvedTitle;
                    // Check if paper has analysis result
                    hasPaperContext = !!paper.has_analysis_result;
                    updateContextBadge();
                }
            } catch (error) {
                console.error('Failed to load paper info:', error);
            }
        }

        function updateContextBadge() {
            const badge = document.getElementById('chat-context-badge');
            if (!badge) return;
            badge.style.display = 'inline-block';
            if (hasPaperContext) {
                badge.textContent = 'Paper loaded';
                badge.className = 'chat-context-badge';
            } else {
                badge.textContent = 'No analysis';
                badge.className = 'chat-context-badge no-context';
            }
        }

        // ========================================
        // Bilingual rendering helpers
        // ========================================
        function convertAlgorithmCodeBlocks(text) {
            var latexCommand = /\\(?:frac|sum|prod|int|sqrt|cdot|times|alpha|beta|gamma|delta|epsilon|theta|lambda|mu|sigma|tau|omega|phi|psi|pi|infty|partial|nabla|text|mathrm|mathbf|mathcal|mathbb|mathit|left|right|bigl|bigr|quad|qquad|label|eqref|hat|bar|vec|tilde|overline|underline|xrightarrow|xleftarrow|lim|log|sin|cos|exp|tag|begin|end|nonumber|centering|mathscr|operatorname|boldsymbol|overset|underset)/;
            return text.replace(/```([a-zA-Z0-9]*)\n([\s\S]*?)```/g, function(match, lang, code) {
                if (!(/\$[^$]+\$/.test(code) && latexCommand.test(code))) return match;
                var lines = code.split('\n');
                var htmlLines = [];
                for (var i = 0; i < lines.length; i++) {
                    var line = lines[i].replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                    htmlLines.push(line);
                }
                return '<div class="algorithm-block">\n' + htmlLines.join('<br>\n') + '\n</div>';
            });
        }

        function wrapLatexDelimiters(text) {
            var latexCommand = /\\(?:frac|sum|prod|int|sqrt|cdot|times|alpha|beta|gamma|delta|epsilon|theta|lambda|mu|sigma|tau|omega|phi|psi|pi|infty|partial|nabla|text|mathrm|mathbf|mathcal|mathbb|mathit|left|right|bigl|bigr|quad|qquad|label|eqref|hat|bar|vec|tilde|overline|underline|xrightarrow|xleftarrow|lim|log|sin|cos|exp|tag|begin|end|nonumber|centering)/;
            var subSuper = /[_^]\{[^}]+\}/;
            var lines = text.split('\n');
            var result = [];
            var inDisplayMath = false;
            for (var i = 0; i < lines.length; i++) {
                var line = lines[i];
                var trimmed = line.trim();
                if (trimmed === '$$') {
                    inDisplayMath = !inDisplayMath;
                    result.push(line);
                    continue;
                }
                if (inDisplayMath) { result.push(line); continue; }
                if (!trimmed || trimmed.startsWith('#') || trimmed.startsWith('!') || trimmed.startsWith('```') || trimmed.startsWith('>') || trimmed.startsWith('- ') || trimmed.startsWith('* ') || /^\d+\.\s/.test(trimmed)) {
                    result.push(line); continue;
                }
                if (/\$[^$]+\$/.test(trimmed) || /\$\$[\s\S]*?\$\$/.test(trimmed)) {
                    result.push(line); continue;
                }
                var lineHasLatex = latexCommand.test(trimmed) || subSuper.test(trimmed);
                if (!lineHasLatex) { result.push(line); continue; }
                var withoutLatex = trimmed.replace(/\\[a-zA-Z]+(\{[^}]*\})?/g, '').replace(/[_^]\{[^}]*\}/g, '').replace(/[=+\-*/|,.\s\[\]\(\)\{\}\\~!@#$%&?;:'"]/g, '');
                var isDisplayMath = withoutLatex.length <= Math.max(trimmed.length * 0.25, 8);
                if (isDisplayMath) { result.push('$$' + trimmed + '$$'); continue; }
                result.push(line);
            }
            return result.join('\n');
        }

        function protectLatexSubSuper(text) {
            text = text.replace(/_\{/g, '\u204FSUB\u204F{');
            text = text.replace(/\^\{/g, '\u204FSUP\u204F{');
            text = text.replace(/_(?=[a-zA-Z0-9])/g, '\u204FSUB\u204F');
            text = text.replace(/\^(?=[a-zA-Z0-9])/g, '\u204FSUP\u204F');
            return text;
        }

        function restoreLatexSubSuper(html) {
            html = html.replace(/\u204FSUB\u204F/g, '_');
            html = html.replace(/\u204FSUP\u204F/g, '^');
            return html;
        }

        function rewriteImages(markdown) {
            return markdown.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, function(match, alt, src) {
                if (!src.startsWith('http') && !src.startsWith('/')) {
                    return '![' + alt + '](/api/paper/' + PAPER_ID + '/bilingual/image?path=' + encodeURIComponent(src) + ')';
                }
                return match;
            });
        }

        function typesetMathJax(el, maxRetries) {
            maxRetries = maxRetries || 5;
            if (!el) return;
            var tryTypeset = function(attempt) {
                if (attempt > maxRetries) return;
                if (window.MathJax && MathJax.typesetPromise) {
                    var ready = (MathJax.startup && MathJax.startup.promise) ? MathJax.startup.promise : Promise.resolve();
                    ready.then(function() {
                        if (MathJax.typesetClear) MathJax.typesetClear([el]);
                        MathJax.typesetPromise([el]).catch(function(err) { console.warn('MathJax error:', err); });
                    });
                } else {
                    var delay = 300 * Math.pow(1.5, attempt);
                    setTimeout(function() { tryTypeset(attempt + 1); }, delay);
                }
            };
            tryTypeset(0);
        }

        function renderBilingualMarkdown(mdText) {
            if (typeof marked === 'undefined') return '<pre>' + mdText + '</pre>';
            marked.setOptions({
                breaks: true, gfm: true,
                highlight: function(code, lang) {
                    if (typeof hljs !== 'undefined' && lang) {
                        try { return hljs.highlight(code, { language: lang }).value; } catch (e) { return hljs.highlightAuto(code).value; }
                    }
                    return code;
                }
            });
            mdText = convertAlgorithmCodeBlocks(mdText);
            mdText = wrapLatexDelimiters(mdText);
            var preserved = [];
            var mdPreserved = mdText.replace(/\$\$([\s\S]*?)\$\$/g, function(match) {
                var id = preserved.length; preserved.push(match); return '@@MJXB' + id + '@@';
            }).replace(/(?<!\\)\$([^\n$]+)\$/g, function(match) {
                var id = preserved.length; preserved.push(match); return '@@MJXI' + id + '@@';
            });
            var html = marked.parse(protectLatexSubSuper(mdPreserved));
            html = restoreLatexSubSuper(html);
            html = html.replace(/@@MJXB(\d+)@@/g, function(_, idx) { return preserved[Number(idx)]; })
                       .replace(/@@MJXI(\d+)@@/g, function(_, idx) { return preserved[Number(idx)]; });
            return html;
        }

        // ========================================
        // Chat sidebar resize
        function setupChatResize() {
            const handle = document.getElementById('chat-resize-handle');
            const sidebar = document.getElementById('chat-sidebar');
            const MIN_WIDTH = 300;
            const MAX_WIDTH = 700;
            let isResizing = false;

            handle.addEventListener('mousedown', function(e) {
                if (!sidebar.classList.contains('open')) return;
                isResizing = true;
                sidebar.classList.add('resizing');
                handle.classList.add('active');
                document.body.style.cursor = 'col-resize';
                document.body.style.userSelect = 'none';
                e.preventDefault();
            });

            document.addEventListener('mousemove', function(e) {
                if (!isResizing) return;
                const newWidth = window.innerWidth - e.clientX;
                const clamped = Math.max(MIN_WIDTH, Math.min(MAX_WIDTH, newWidth));
                sidebar.style.width = clamped + 'px';
                sidebar.style.minWidth = clamped + 'px';
            });

            document.addEventListener('mouseup', function() {
                if (!isResizing) return;
                isResizing = false;
                sidebar.classList.remove('resizing');
                handle.classList.remove('active');
                document.body.style.cursor = '';
                document.body.style.userSelect = '';
            });
        }

        function clearChat() {
            chatMessages = [];
            const messagesEl = document.getElementById('chat-messages');
            messagesEl.innerHTML = '<div class="chat-welcome" id="chat-welcome"><i class="fas fa-robot"></i><p>Ask questions about this paper</p><p style="font-size: 12px; color: #666; margin-top: 8px;">The AI analysis result is used as context.<br>Select text and paste it here to ask about specific parts.</p></div>';
        }

        async function sendChatMessage() {
            if (isChatStreaming) return;

            const input = document.getElementById('chat-input');
            const message = input.value.trim();
            if (!message) return;

            // Hide welcome message
            const welcome = document.getElementById('chat-welcome');
            if (welcome) welcome.remove();

            // Add user message
            chatMessages.push({ role: 'user', content: message });
            appendMessageToUI('user', message);

            // Clear input
            input.value = '';
            input.style.height = 'auto';

            // Disable send button
            isChatStreaming = true;
            document.getElementById('chat-send-btn').disabled = true;

            // Create assistant message placeholder
            const assistantEl = appendMessageToUI('assistant', '');
            const mdContentEl = assistantEl.querySelector('.md-content') || assistantEl;

            try {
                const response = await fetch('/api/paper/' + PAPER_ID + '/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages: chatMessages })
                });

                if (!response.ok) {
                    const errorData = await response.json().catch(function() { return {}; });
                    throw new Error(errorData.error || 'Request failed');
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let fullContent = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value, { stream: true });
                    const lines = chunk.split('\n');

                    for (var i = 0; i < lines.length; i++) {
                        var line = lines[i].trim();
                        if (!line.startsWith('data: ')) continue;
                        var data = line.slice(6);

                        if (data === '[DONE]') break;

                        try {
                            var parsed = JSON.parse(data);
                            if (parsed.error) {
                                throw new Error(parsed.error);
                            }
                            if (parsed.content) {
                                fullContent += parsed.content;
                                // Render markdown
                                if (typeof marked !== 'undefined') {
                                    mdContentEl.innerHTML = '<div class="md-content">' + marked.parse(fullContent) + '<span class="typing-cursor"></span></div>';
                                } else {
                                    mdContentEl.textContent = fullContent + '|';
                                }
                                // Auto scroll
                                var chatMessagesEl = document.getElementById('chat-messages');
                                chatMessagesEl.scrollTop = chatMessagesEl.scrollHeight;
                            }
                        } catch (e) {
                            if (e.message && !e.message.includes('JSON')) {
                                throw e;
                            }
                        }
                    }
                }

                // Final render without cursor
                chatMessages.push({ role: 'assistant', content: fullContent });
                if (typeof marked !== 'undefined') {
                    mdContentEl.innerHTML = '<div class="md-content">' + marked.parse(fullContent) + '</div>';
                } else {
                    mdContentEl.textContent = fullContent;
                }

            } catch (error) {
                console.error('Chat error:', error);
                mdContentEl.innerHTML = '<div style="color: #ff6b6b;"><i class="fas fa-exclamation-circle"></i> ' + escapeHtml(error.message) + '</div>';
            } finally {
                isChatStreaming = false;
                document.getElementById('chat-send-btn').disabled = false;
                input.focus();
            }
        }

        function appendMessageToUI(role, content) {
            var messagesEl = document.getElementById('chat-messages');
            var msgEl = document.createElement('div');
            msgEl.className = 'chat-message ' + role;

            if (role === 'assistant') {
                if (typeof marked !== 'undefined' && content) {
                    msgEl.innerHTML = '<div class="md-content">' + marked.parse(content) + '</div>';
                } else {
                    msgEl.textContent = content;
                }
            } else {
                msgEl.textContent = content;
            }

            messagesEl.appendChild(msgEl);
            messagesEl.scrollTop = messagesEl.scrollHeight;
            return msgEl;
        }

        function escapeHtml(text) {
            var div = document.createElement('div');
            div.appendChild(document.createTextNode(text));
            return div.innerHTML;
        }

        // Reading time tracking
        let readStartTime = null;
        let readTimeInterval = null;
        let lastRecordedSeconds = 0;
        let lastActivityTime = null;
        let isTimerActive = true;
        let activityCheckInterval = null;
        const INACTIVITY_THRESHOLD = 60000;
        const TIMER_INTERVAL = 10000;
        let isPageUnloading = false;

        // Format date as YYYY-MM-DD (local time)
        function formatDateLocal(date) {
            const d = date || new Date();
            const year = d.getFullYear();
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return year + '-' + month + '-' + day;
        }

        // User activity handler
        function recordUserActivity() {
            const now = Date.now();
            const wasInactive = !isTimerActive;
            lastActivityTime = now;

            if (wasInactive) {
                console.log('User activity detected, resume timing');
                isTimerActive = true;
                readStartTime = now;
            }
        }

        // Check for long inactivity
        function checkUserActivity() {
            if (!lastActivityTime || !isTimerActive) {
                return;
            }

            const now = Date.now();
            const timeSinceLastActivity = now - lastActivityTime;

            if (timeSinceLastActivity > INACTIVITY_THRESHOLD && isTimerActive) {
                console.log('Inactivity > 1 minute, pause timing');
                isTimerActive = false;
                if (readStartTime) {
                    const elapsed = Math.floor((lastActivityTime - readStartTime) / 1000);
                    const incrementSeconds = elapsed - lastRecordedSeconds;

                    if (incrementSeconds > 0) {
                        console.log('Saving reading time before inactivity:', incrementSeconds, 'seconds');
                        sendReadingTime(incrementSeconds, false);
                        recordDailyReadingTime(incrementSeconds);
                        lastRecordedSeconds += incrementSeconds;
                    }
                }
            }
        }

        // Start monitoring activity
        function startActivityMonitoring() {
            const activityEvents = ['mousemove', 'mousedown', 'keydown', 'scroll', 'touchstart', 'click'];

            activityEvents.forEach(function(eventType) {
                document.addEventListener(eventType, recordUserActivity, { passive: true });
                const iframe = document.getElementById('pdf-iframe');
                if (iframe) {
                    try {
                        iframe.contentWindow && iframe.contentWindow.document && iframe.contentWindow.document.addEventListener(eventType, recordUserActivity, { passive: true });
                    } catch (e) {
                        // Cross-origin, ignore
                    }
                }
            });

            lastActivityTime = Date.now();
            isTimerActive = true;

            activityCheckInterval = setInterval(checkUserActivity, 10000);

            console.log('Activity monitoring started');
        }

        // Stop monitoring
        function stopActivityMonitoring() {
            if (activityCheckInterval) {
                clearInterval(activityCheckInterval);
                activityCheckInterval = null;
            }
            console.log('Activity monitoring stopped');
        }

        // Send reading time to server (with sendBeacon support for page unload)
        function sendReadingTime(seconds, useBeacon) {
            if (seconds <= 0) return;

            const url = '/api/paper/' + PAPER_ID + '/read-time';
            const data = JSON.stringify({ increment: seconds });

            if (useBeacon && navigator.sendBeacon) {
                const blob = new Blob([data], { type: 'application/json' });
                const sent = navigator.sendBeacon(url, blob);
                if (sent) {
                    console.log('Reading time sent via sendBeacon:', seconds, 'seconds');
                } else {
                    console.warn('sendBeacon failed, falling back to fetch');
                    fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: data,
                        keepalive: true
                    }).catch(function(err) { console.error('Failed to record reading time:', err); });
                }
            } else {
                fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: data,
                    keepalive: useBeacon
                }).catch(function(err) { console.error('Failed to record reading time:', err); });
            }
        }

        // Record daily reading time to server (and localStorage as backup)
        function recordDailyReadingTime(seconds) {
            if (seconds <= 0) return;

            const today = formatDateLocal(new Date());
            const minutes = Math.ceil(seconds / 60);

            fetch('/api/settings/reading-history/record', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ minutes: minutes, date: today })
            }).then(function(response) {
                if (response.ok) {
                    console.log('Recorded daily reading time: ' + minutes + ' minutes');
                }
            }).catch(function(err) {
                console.error('Failed to record daily reading time:', err);
            });

            try {
                const key = 'dailyReadingData';
                let data = {};
                const saved = localStorage.getItem(key);
                if (saved) {
                    data = JSON.parse(saved);
                }
                data[today] = (data[today] || 0) + minutes;

                const cutoffDate = new Date();
                cutoffDate.setDate(cutoffDate.getDate() - 400);
                const cutoffStr = formatDateLocal(cutoffDate);
                Object.keys(data).forEach(function(date) {
                    if (date < cutoffStr) {
                        delete data[date];
                    }
                });
                localStorage.setItem(key, JSON.stringify(data));
            } catch (e) {
                console.error('Failed to save to localStorage:', e);
            }
        }

        function startReadingTimer() {
            readStartTime = Date.now();
            lastRecordedSeconds = 0;
            isTimerActive = true;
            console.log('Start recording reading time');

            startActivityMonitoring();

            readTimeInterval = setInterval(function() {
                if (readStartTime && isTimerActive && !isPageUnloading) {
                    const now = Date.now();
                    const elapsed = Math.floor((now - readStartTime) / 1000);
                    const incrementSeconds = elapsed - lastRecordedSeconds;

                    if (incrementSeconds > 0) {
                        sendReadingTime(incrementSeconds, false);
                        recordDailyReadingTime(incrementSeconds);
                        lastRecordedSeconds = elapsed;
                    }
                }
            }, TIMER_INTERVAL);
        }

        function stopReadingTimer(useBeacon) {
            stopActivityMonitoring();

            if (readStartTime && isTimerActive) {
                const now = Date.now();
                const elapsed = Math.floor((now - readStartTime) / 1000);
                const incrementSeconds = elapsed - lastRecordedSeconds;
                console.log('Stop recording reading time, increment:', incrementSeconds, 'seconds');

                if (incrementSeconds > 0) {
                    sendReadingTime(incrementSeconds, useBeacon);
                    recordDailyReadingTime(incrementSeconds);
                }
            }

            readStartTime = null;
            lastRecordedSeconds = 0;
            isTimerActive = false;
            lastActivityTime = null;

            if (readTimeInterval) {
                clearInterval(readTimeInterval);
                readTimeInterval = null;
            }
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', function() {
            setupBackButton();
            setupFontSize();
            loadPaperInfo();

            var useChinese = (document.body.getAttribute('data-use-chinese') === 'true');
            var hasBilingual = (document.body.getAttribute('data-has-bilingual') === 'true');

            if (useChinese && hasBilingual) {
                loadBilingualContent();
            } else {
                initPDFViewer();
            }

            setupChat();
            setupChatResize();
            setupThemeToggle();
            startReadingTimer();
        });

        // Stop timer on unload (use sendBeacon for reliable delivery)
        window.addEventListener('beforeunload', function() {
            isPageUnloading = true;
            stopReadingTimer(true);
        });

        // Also handle pagehide event (more reliable in some browsers)
        window.addEventListener('pagehide', function() {
            isPageUnloading = true;
            stopReadingTimer(true);
        });

        // Pause/resume timer on visibility change
        document.addEventListener('visibilitychange', function() {
            if (document.hidden) {
                stopReadingTimer(false);
            } else {
                startReadingTimer();
            }
        });
    </script>
</body>
</html>
