<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ paper_title or 'PDF 阅读器' }} - Resophy</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/website_logo.png') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #2c2c2c;
            color: white;
            overflow: hidden;
        }
        
        .header {
            background: #1a1a1a;
            border-bottom: 1px solid #444;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
        }
        
        .header h3 {
            margin: 0;
            font-size: 16px;
            color: white;
        }
        
        .btn {
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 8px 12px;
            cursor: pointer;
            font-size: 14px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            transition: background-color 0.2s;
        }
        
        .btn:hover {
            background: #0056b3;
        }
        
        .btn-secondary {
            background: #6c757d;
        }
        
        .btn-secondary:hover {
            background: #545b62;
        }
        
        .pdf-container {
            height: calc(100vh - 60px);
            width: 100%;
        }
        
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            flex-direction: column;
            color: #ccc;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #444;
            border-top: 4px solid #007bff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body data-use-chinese="{{ 'true' if use_chinese else 'false' }}">
    <div class="header">
        <div>
            <button id="back-btn" class="btn btn-secondary" title="关闭当前标签页 (Ctrl+W)">
                <i class="fas fa-times"></i> 关闭
            </button>
        </div>
        <h3 id="pdf-title">{{ paper_title or 'PDF 阅读器' }}</h3>
        <div>
            <a href="/api/paper/{{ paper_id }}/file" class="btn btn-secondary" download>
                <i class="fas fa-download"></i> 下载
            </a>
        </div>
    </div>
    
    <div class="pdf-container">
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>正在加载 PDF 阅读器...</p>
        </div>
        <iframe 
            id="pdf-iframe" 
            style="display: none;"
            src=""
            title="PDF 阅读器">
        </iframe>
    </div>
    
    <script>
        // 获取论文信息并设置标题
        async function loadPaperInfo() {
            try {
                const response = await fetch('/api/paper/{{ paper_id }}');
                if (response.ok) {
                    const paper = await response.json();
                    const resolvedTitle = paper.title || paper.filename || 'PDF 阅读器';
                    const titleEl = document.getElementById('pdf-title');
                    if (titleEl) {
                        titleEl.textContent = resolvedTitle;
                    }
                    document.title = resolvedTitle;
                }
            } catch (error) {
                console.error('加载论文信息失败:', error);
            }
        }
        
        // 初始化 PDF 查看器
        function initPDFViewer() {
            const iframe = document.getElementById('pdf-iframe');
            const loading = document.getElementById('loading');
            
            // 检查是否使用中文版（从 data 属性读取，避免内联模板干扰 JS 解析）
            const useChinese = (document.body.getAttribute('data-use-chinese') === 'true');
            let pdfUrl = window.location.origin + '/api/paper/{{ paper_id }}/file';
            
            if (useChinese) {
                // 使用中文版
                pdfUrl = window.location.origin + '/api/paper/{{ paper_id }}/chinese/file';
            }
            
            console.log('PDF URL:', pdfUrl);
            console.log('使用中文版:', useChinese);
            
            // 使用 fetch 检查文件是否存在
            fetch(pdfUrl, { method: 'HEAD' })
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                    }
                    console.log('PDF文件检查成功');
                    
                    // 直接在 iframe 中加载原始 PDF，避免跨域阻止
                    iframe.src = pdfUrl;
                    
                    // 监听 iframe 加载完成
                    iframe.onload = function() {
                        console.log('PDF iframe 加载完成');
                        loading.style.display = 'none';
                        iframe.style.display = 'block';
                    };
                    
                    // 设置超时，如果10秒还没加载完成，显示错误
                    setTimeout(() => {
                        if (loading.style.display !== 'none') {
                            console.error('PDF加载超时');
                            loading.innerHTML = `
                                <i class="fas fa-exclamation-triangle" style="font-size: 48px; color: #dc3545; margin-bottom: 15px;"></i>
                                <p style="color: #dc3545;">PDF 加载超时</p>
                                <p style="color: #999; font-size: 12px; margin-top: 10px;">请检查 PDF 文件是否存在，或尝试直接下载</p>
                                <button class="btn" onclick="location.reload()" style="margin-top: 15px;">重新加载</button>
                                <a href="${pdfUrl}" class="btn btn-secondary" download style="margin-top: 10px; margin-left: 10px;">下载PDF</a>
                            `;
                        }
                    }, 10000);
                })
                .catch(error => {
                    console.error('PDF文件检查失败:', error);
                    loading.innerHTML = `
                        <i class="fas fa-exclamation-triangle" style="font-size: 48px; color: #dc3545; margin-bottom: 15px;"></i>
                        <p style="color: #dc3545;">PDF 加载失败</p>
                        <p style="color: #999; font-size: 12px; margin-top: 10px;">错误信息: ${error.message}</p>
                        <button class="btn" onclick="location.reload()" style="margin-top: 15px;">重新加载</button>
                        <a href="${pdfUrl}" class="btn btn-secondary" download style="margin-top: 10px; margin-left: 10px;">下载PDF</a>
                    `;
                });
            
            // 错误处理
            iframe.onerror = function() {
                console.error('PDF iframe 加载错误');
                loading.innerHTML = `
                    <i class="fas fa-exclamation-triangle" style="font-size: 48px; color: #dc3545; margin-bottom: 15px;"></i>
                    <p style="color: #dc3545;">PDF 加载失败</p>
                    <button class="btn" onclick="location.reload()">重新加载</button>
                    <a href="${pdfUrl}" class="btn btn-secondary" download style="margin-top: 10px; margin-left: 10px;">下载PDF</a>
                `;
            };
        }
        
        // 关闭窗口功能
        function closeWindow() {
            // 检查是否是在新标签页中打开的
            if (window.opener) {
                // 如果是从其他窗口打开的，关闭当前窗口
                window.close();
            } else {
                // 尝试关闭窗口
                const closed = window.close();
                // 如果浏览器不允许关闭（比如直接输入URL访问），则返回主页
                setTimeout(() => {
                    if (!closed && !window.closed) {
                        window.location.href = '/';
                    }
                }, 100);
            }
        }
        
        // 返回按钮功能
        function setupBackButton() {
            const backBtn = document.getElementById('back-btn');
            backBtn.addEventListener('click', closeWindow);
            
            // 添加键盘快捷键支持
            document.addEventListener('keydown', function(e) {
                // Ctrl+W 或 Cmd+W 关闭窗口
                if ((e.ctrlKey || e.metaKey) && e.key === 'w') {
                    e.preventDefault();
                    closeWindow();
                }
                // ESC 键也可以关闭窗口
                if (e.key === 'Escape') {
                    closeWindow();
                }
            });
        }
        
        // 记录阅读时间
        let readStartTime = null;
        let readTimeInterval = null;
        let lastRecordedSeconds = 0; // 记录上次已记录的秒数
        let lastActivityTime = null; // 最后一次用户活动时间
        let isTimerActive = true; // 计时器是否激活（用于区分用户无活动状态）
        let activityCheckInterval = null; // 活动检测定时器
        const INACTIVITY_THRESHOLD = 60000; // 无活动阈值：1分钟（毫秒）
        
        // 格式化日期为 YYYY-MM-DD（使用本地时间，避免时区问题）
        function formatDateLocal(date) {
            const d = date || new Date();
            const year = d.getFullYear();
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }
        
        // 记录用户活动
        function recordUserActivity() {
            const now = Date.now();
            const wasInactive = !isTimerActive;
            lastActivityTime = now;
            
            // 如果之前是非活动状态，现在恢复活动，需要重新开始计时
            if (wasInactive) {
                console.log('检测到用户活动，恢复计时');
                isTimerActive = true;
                // 重新设置计时起点，但保留已记录的秒数
                readStartTime = now;
            }
        }
        
        // 检测用户是否长时间无活动
        function checkUserActivity() {
            if (!lastActivityTime || !isTimerActive) {
                return;
            }
            
            const now = Date.now();
            const timeSinceLastActivity = now - lastActivityTime;
            
            // 如果超过阈值且计时器还在活动状态，则暂停计时
            if (timeSinceLastActivity > INACTIVITY_THRESHOLD && isTimerActive) {
                console.log('检测到用户无活动超过1分钟，暂停计时');
                isTimerActive = false;
                // 保存当前的阅读时间
                if (readStartTime) {
                    const elapsed = Math.floor((lastActivityTime - readStartTime) / 1000); // 使用最后活动时间
                    const incrementSeconds = elapsed - lastRecordedSeconds;
                    
                    if (incrementSeconds > 0) {
                        console.log('保存无活动前的阅读时间:', incrementSeconds, '秒');
                        // 发送增量到后端
                        fetch(`/api/paper/{{ paper_id }}/read-time`, {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                            },
                            body: JSON.stringify({
                                increment: incrementSeconds
                            })
                        }).catch(err => console.error('记录阅读时间失败:', err));
                        
                        // 记录到每日阅读数据
                        recordDailyReadingTime(incrementSeconds);
                        lastRecordedSeconds += incrementSeconds;
                    }
                }
            }
        }
        
        // 启动用户活动监听
        function startActivityMonitoring() {
            // 监听各种用户活动事件
            const activityEvents = ['mousemove', 'mousedown', 'keydown', 'scroll', 'touchstart', 'click'];
            
            activityEvents.forEach(eventType => {
                document.addEventListener(eventType, recordUserActivity, { passive: true });
                // 也监听 iframe 内的活动（如果可以访问）
                const iframe = document.getElementById('pdf-iframe');
                if (iframe) {
                    try {
                        iframe.contentWindow?.document?.addEventListener(eventType, recordUserActivity, { passive: true });
                    } catch (e) {
                        // 跨域限制，无法访问 iframe 内容
                    }
                }
            });
            
            // 初始化最后活动时间
            lastActivityTime = Date.now();
            isTimerActive = true;
            
            // 每10秒检查一次用户活动状态
            activityCheckInterval = setInterval(checkUserActivity, 10000);
            
            console.log('用户活动监控已启动');
        }
        
        // 停止用户活动监听
        function stopActivityMonitoring() {
            if (activityCheckInterval) {
                clearInterval(activityCheckInterval);
                activityCheckInterval = null;
            }
            console.log('用户活动监控已停止');
        }
        
        // 记录每日阅读时间到服务器（同时保存到 localStorage 作为备份）
        function recordDailyReadingTime(seconds) {
            if (seconds <= 0) return;
            
            const today = formatDateLocal(new Date());
            const minutes = Math.ceil(seconds / 60); // 秒转分钟，向上取整
            
            // 发送到服务器
            fetch('/api/settings/reading-history/record', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ minutes, date: today })
            }).then(response => {
                if (response.ok) {
                    console.log(`记录每日阅读时间到服务器: ${minutes} 分钟`);
                }
            }).catch(err => {
                console.error('记录每日阅读时间失败:', err);
            });
            
            // 同时保存到 localStorage 作为备份
            try {
                const key = 'dailyReadingData';
                let data = {};
                const saved = localStorage.getItem(key);
                if (saved) {
                    data = JSON.parse(saved);
                }
                data[today] = (data[today] || 0) + minutes;
                
                // 只保留过去 400 天的数据
                const cutoffDate = new Date();
                cutoffDate.setDate(cutoffDate.getDate() - 400);
                const cutoffStr = formatDateLocal(cutoffDate);
                Object.keys(data).forEach(date => {
                    if (date < cutoffStr) {
                        delete data[date];
                    }
                });
                localStorage.setItem(key, JSON.stringify(data));
            } catch (e) {
                console.error('保存到 localStorage 失败:', e);
            }
        }
        
        function startReadingTimer() {
            readStartTime = Date.now();
            lastRecordedSeconds = 0;
            isTimerActive = true;
            console.log('开始记录阅读时间');
            
            // 启动用户活动监控
            startActivityMonitoring();
            
            // 每30秒记录一次阅读时间（发送增量）
            readTimeInterval = setInterval(function() {
                // 只有在用户活动状态下才记录时间
                if (readStartTime && isTimerActive) {
                    const now = Date.now();
                    const elapsed = Math.floor((now - readStartTime) / 1000); // 秒
                    const incrementSeconds = elapsed - lastRecordedSeconds;
                    
                    if (incrementSeconds > 0) {
                        // 发送增量到后端记录
                        fetch(`/api/paper/{{ paper_id }}/read-time`, {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                            },
                            body: JSON.stringify({
                                increment: incrementSeconds  // 发送增量而不是累计
                            })
                        }).catch(err => console.error('记录阅读时间失败:', err));
                        
                        // 记录增量到每日阅读数据
                        recordDailyReadingTime(incrementSeconds);
                        lastRecordedSeconds = elapsed;
                    }
                }
            }, 30000); // 每30秒记录一次
        }
        
        function stopReadingTimer() {
            // 停止用户活动监控
            stopActivityMonitoring();
            
            if (readStartTime && isTimerActive) {
                // 只有在活动状态下才计算并保存时间
                const now = Date.now();
                const elapsed = Math.floor((now - readStartTime) / 1000); // 秒
                const incrementSeconds = elapsed - lastRecordedSeconds;
                console.log('停止记录阅读时间, 本次增量:', incrementSeconds, '秒');
                
                if (incrementSeconds > 0) {
                    // 发送最后的增量到后端
                    fetch(`/api/paper/{{ paper_id }}/read-time`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            increment: incrementSeconds  // 发送增量
                        })
                    }).catch(err => console.error('记录阅读时间失败:', err));
                    
                    // 记录到每日阅读数据
                    recordDailyReadingTime(incrementSeconds);
                }
            }
            
            readStartTime = null;
            lastRecordedSeconds = 0;
            isTimerActive = false;
            lastActivityTime = null;
            
            if (readTimeInterval) {
                clearInterval(readTimeInterval);
                readTimeInterval = null;
            }
        }
        
        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            setupBackButton();
            loadPaperInfo();
            initPDFViewer();
            startReadingTimer();
        });
        
        // 页面关闭或离开时停止计时
        window.addEventListener('beforeunload', function() {
            stopReadingTimer();
        });
        
        // 页面隐藏时停止计时（切换标签页等）
        document.addEventListener('visibilitychange', function() {
            if (document.hidden) {
                stopReadingTimer();
            } else {
                startReadingTimer();
            }
        });
    </script>
</body>
</html>
