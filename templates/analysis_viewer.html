<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 解读 - Resophy</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/website_logo.png') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [["$", "$"], ["\\(", "\\)"]],
                displayMath: [["$$", "$$"], ["\\[", "\\]"]]
            },
            options: {
                skipHtmlTags: ["script", "noscript", "style", "textarea", "pre"],
                processHtmlClass: "markdown-viewer"
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
    <style>
        * { 
            box-sizing: border-box; 
            margin: 0;
            padding: 0;
        }
        
        body { 
            margin: 0; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333; 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Noto Sans', sans-serif;
            min-height: 100vh;
        }
        
        .header { 
            height: 64px; 
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.95);
            border-bottom: 1px solid rgba(0, 0, 0, 0.08);
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 0 32px; 
            position: sticky; 
            top: 0; 
            z-index: 100;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
        }
        
        .header-content {
            width: min(900px, 100%);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .header .btn { 
            padding: 10px 20px; 
            border: none; 
            background: rgba(103, 126, 234, 0.1);
            border-radius: 8px; 
            cursor: pointer; 
            display: inline-flex; 
            align-items: center; 
            gap: 8px;
            font-size: 14px;
            font-weight: 500;
            color: #667eea;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .header .btn:hover { 
            background: rgba(103, 126, 234, 0.2);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(103, 126, 234, 0.2);
        }
        
        .header .btn i {
            font-size: 16px;
        }
        
        .title { 
            font-size: 20px; 
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .title::before {
            content: '✨';
            font-size: 24px;
        }
        
        .container { 
            min-height: calc(100vh - 64px); 
            overflow-y: auto; 
            padding: 48px 32px; 
            display: flex; 
            justify-content: center;
        }
        
        .content { 
            width: min(900px, 100%); 
            background: white;
            border-radius: 16px;
            padding: 48px 56px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            animation: fadeIn 0.5s ease-out;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* Markdown 样式优化 */
        .markdown-viewer h1 { 
            font-size: 2.5em; 
            margin-bottom: 0.5em;
            margin-top: 0;
            color: #1a202c;
            font-weight: 800;
            line-height: 1.2;
            border-bottom: 3px solid #667eea;
            padding-bottom: 0.3em;
        }
        
        .markdown-viewer h2 { 
            font-size: 2em; 
            margin-top: 1.5em;
            margin-bottom: 0.5em;
            color: #2d3748;
            font-weight: 700;
            line-height: 1.3;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 0.3em;
        }
        
        .markdown-viewer h3 { 
            font-size: 1.5em; 
            margin-top: 1.2em;
            margin-bottom: 0.5em;
            color: #4a5568;
            font-weight: 600;
        }
        
        .markdown-viewer h4 {
            font-size: 1.25em;
            margin-top: 1em;
            margin-bottom: 0.5em;
            color: #718096;
            font-weight: 600;
        }
        
        .markdown-viewer p { 
            line-height: 1.8; 
            margin-bottom: 1.2em;
            color: #2d3748;
            font-size: 16px;
        }
        
        .markdown-viewer ul, .markdown-viewer ol {
            margin-left: 1.5em;
            margin-bottom: 1.2em;
            line-height: 1.8;
        }
        
        .markdown-viewer li {
            margin-bottom: 0.5em;
            color: #2d3748;
        }
        
        .markdown-viewer code { 
            padding: 0.2em 0.5em; 
            background: linear-gradient(135deg, rgba(103, 126, 234, 0.1), rgba(118, 75, 162, 0.1));
            border: 1px solid rgba(103, 126, 234, 0.2);
            border-radius: 4px;
            font-family: 'Fira Code', 'Monaco', 'Consolas', monospace;
            font-size: 0.9em;
            color: #667eea;
            font-weight: 500;
        }
        
        .markdown-viewer pre { 
            padding: 20px; 
            background: #1a202c;
            border-radius: 12px; 
            overflow: auto;
            margin-bottom: 1.5em;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
            border: 1px solid #2d3748;
        }
        
        .markdown-viewer pre code {
            background: none;
            border: none;
            color: #e2e8f0;
            padding: 0;
            font-size: 14px;
        }
        
        .markdown-viewer img { 
            max-width: 100%; 
            height: auto; 
            border-radius: 12px; 
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
            margin: 1.5em 0;
            transition: transform 0.3s ease;
        }
        
        .markdown-viewer img:hover {
            transform: scale(1.02);
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.15);
        }
        
        .markdown-viewer blockquote {
            margin: 1.5em 0;
            padding: 1em 1.5em;
            border-left: 4px solid #667eea;
            background: rgba(103, 126, 234, 0.05);
            border-radius: 0 8px 8px 0;
            color: #4a5568;
            font-style: italic;
        }
        
        .markdown-viewer table {
            width: 100%;
            border-collapse: collapse;
            margin: 1.5em 0;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            border-radius: 8px;
            overflow: hidden;
        }
        
        .markdown-viewer th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px;
            text-align: left;
            font-weight: 600;
        }
        
        .markdown-viewer td {
            padding: 12px;
            border-bottom: 1px solid #e2e8f0;
        }
        
        .markdown-viewer tr:hover {
            background: rgba(103, 126, 234, 0.05);
        }
        
        .markdown-viewer a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
            border-bottom: 2px solid transparent;
            transition: border-color 0.3s ease;
        }
        
        .markdown-viewer a:hover {
            border-bottom-color: #667eea;
        }
        
        .markdown-viewer hr {
            border: none;
            height: 2px;
            background: linear-gradient(90deg, transparent, #e2e8f0, transparent);
            margin: 2em 0;
        }
        
        .loading { 
            height: 100vh; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
            color: white;
            font-size: 18px;
        }
        
        .loading::before {
            content: '';
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* 滚动条美化 */
        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }
        
        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.05);
        }
        
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 5px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(135deg, #5568d3 0%, #653a8b 100%);
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <button id="close-btn" class="btn" title="关闭当前标签页 (Ctrl+W / Esc)">
                <i class="fas fa-arrow-left"></i> 返回
            </button>
            <div class="title">AI 解读阅读器</div>
            <div style="width:80px"></div>
        </div>
    </div>
    <div id="loading" class="loading">正在加载 AI 解读内容...</div>
    <div id="container" class="container" style="display:none;">
        <div class="content">
            <div id="md" class="markdown-viewer"></div>
        </div>
    </div>
    <script>
        const paperId = {{ paper_id|tojson }};

        function rewriteImages(markdown) {
            const imageRegex = /!\[([^\]]*)\]\(([^)]+)\)/g;
            return markdown.replace(imageRegex, (match, alt, src) => {
                if (!src.startsWith('http') && !src.startsWith('/')) {
                    const encodedPath = encodeURIComponent(src);
                    return `![${alt}](/api/paper/${paperId}/analysis/image?path=${encodedPath})`;
                }
                return match;
            });
        }

        function renderMarkdown(mdText) {
            if (typeof marked !== 'undefined') {
                marked.setOptions({
                    breaks: true,
                    gfm: true,
                    highlight: function(code, lang) {
                        if (typeof hljs !== 'undefined' && lang) {
                            try { return hljs.highlight(code, { language: lang }).value; }
                            catch (e) { return hljs.highlightAuto(code).value; }
                        }
                        return code;
                    }
                });
                const preserved = [];
                const mdPreserved = mdText.replace(/\$\$([\s\S]*?)\$\$/g, function(match) {
                    const id = preserved.length;
                    preserved.push(match);
                    return `@@MJX_BLOCK_${id}@@`;
                }).replace(/(?<!\\)\$([^\n$]+)\$/g, function(match) {
                    const id = preserved.length;
                    preserved.push(match);
                    return `@@MJX_INLINE_${id}@@`;
                });
                let html = marked.parse(mdPreserved);
                html = html.replace(/@@MJX_(BLOCK|INLINE)_(\d+)@@/g, function(_, __, idx) {
                    return preserved[Number(idx)];
                });
                const el = document.getElementById('md');
                el.innerHTML = html;
                if (typeof hljs !== 'undefined') {
                    document.querySelectorAll('pre code').forEach((block) => hljs.highlightElement(block));
                }
                if (window.MathJax && MathJax.startup && MathJax.startup.promise) {
                    MathJax.startup.promise.then(() => {
                        if (MathJax.typesetPromise) {
                            MathJax.typesetPromise([el]);
                        } else if (MathJax.typeset) {
                            MathJax.typeset([el]);
                        }
                    });
                } else if (window.MathJax) {
                    if (MathJax.typesetPromise) {
                        MathJax.typesetPromise([el]);
                    } else if (MathJax.typeset) {
                        MathJax.typeset([el]);
                    }
                } else {
                    setTimeout(() => {
                        if (window.MathJax && MathJax.typesetPromise) {
                            MathJax.typesetPromise([el]);
                        }
                    }, 500);
                }
            } else {
                document.getElementById('md').innerHTML = `<pre style="white-space: pre-wrap;">${mdText}</pre>`;
            }
        }

        async function loadContent() {
            try {
                const res = await fetch(`/api/paper/${paperId}/analysis/result`);
                const json = await res.json();
                if (!res.ok || !json.success) throw new Error(json.error || '加载失败');
                const md = rewriteImages(json.content || '');
                renderMarkdown(md);
                document.getElementById('loading').style.display = 'none';
                document.getElementById('container').style.display = 'block';
            } catch (e) {
                document.getElementById('loading').textContent = `加载失败：${e.message}`;
            }
        }

        function setupClose() {
            const btn = document.getElementById('close-btn');
            btn.onclick = () => { window.close(); };
            window.addEventListener('keydown', (e) => {
                if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'w') {
                    e.preventDefault(); window.close();
                } else if (e.key === 'Escape') {
                    e.preventDefault(); window.close();
                }
            });
        }

        // 记录阅读时间
        let readStartTime = null;
        let readTimeInterval = null;
        let lastRecordedSeconds = 0; // 记录上次已记录的秒数
        let lastActivityTime = null; // 最后一次用户活动时间
        let isTimerActive = true; // 计时器是否激活（用于区分用户无活动状态）
        let activityCheckInterval = null; // 活动检测定时器
        const INACTIVITY_THRESHOLD = 60000; // 无活动阈值：1分钟（毫秒）
        
        // 格式化日期为 YYYY-MM-DD（使用本地时间，避免时区问题）
        function formatDateLocal(date) {
            const d = date || new Date();
            const year = d.getFullYear();
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }
        
        // 记录用户活动
        function recordUserActivity() {
            const now = Date.now();
            const wasInactive = !isTimerActive;
            lastActivityTime = now;
            
            // 如果之前是非活动状态，现在恢复活动，需要重新开始计时
            if (wasInactive) {
                console.log('检测到用户活动，恢复计时');
                isTimerActive = true;
                // 重新设置计时起点，但保留已记录的秒数
                readStartTime = now;
            }
        }
        
        // 检测用户是否长时间无活动
        function checkUserActivity() {
            if (!lastActivityTime || !isTimerActive) {
                return;
            }
            
            const now = Date.now();
            const timeSinceLastActivity = now - lastActivityTime;
            
            // 如果超过阈值且计时器还在活动状态，则暂停计时
            if (timeSinceLastActivity > INACTIVITY_THRESHOLD && isTimerActive) {
                console.log('检测到用户无活动超过1分钟，暂停计时');
                isTimerActive = false;
                // 保存当前的阅读时间
                if (readStartTime) {
                    const elapsed = Math.floor((lastActivityTime - readStartTime) / 1000); // 使用最后活动时间
                    const incrementSeconds = elapsed - lastRecordedSeconds;
                    
                    if (incrementSeconds > 0) {
                        console.log('保存无活动前的阅读时间:', incrementSeconds, '秒');
                        // 发送增量到后端
                        fetch(`/api/paper/${paperId}/analysis-view-time`, {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                            },
                            body: JSON.stringify({
                                increment: incrementSeconds
                            })
                        }).catch(err => console.error('记录阅读时间失败:', err));
                        
                        // 记录到每日阅读数据
                        recordDailyReadingTime(incrementSeconds);
                        lastRecordedSeconds += incrementSeconds;
                    }
                }
            }
        }
        
        // 启动用户活动监听
        function startActivityMonitoring() {
            // 监听各种用户活动事件
            const activityEvents = ['mousemove', 'mousedown', 'keydown', 'scroll', 'touchstart', 'click'];
            
            activityEvents.forEach(eventType => {
                document.addEventListener(eventType, recordUserActivity, { passive: true });
            });
            
            // 初始化最后活动时间
            lastActivityTime = Date.now();
            isTimerActive = true;
            
            // 每10秒检查一次用户活动状态
            activityCheckInterval = setInterval(checkUserActivity, 10000);
            
            console.log('用户活动监控已启动');
        }
        
        // 停止用户活动监听
        function stopActivityMonitoring() {
            if (activityCheckInterval) {
                clearInterval(activityCheckInterval);
                activityCheckInterval = null;
            }
            console.log('用户活动监控已停止');
        }
        
        // 记录每日阅读时间到服务器（同时保存到 localStorage 作为备份）
        function recordDailyReadingTime(seconds) {
            if (seconds <= 0) return;
            
            const today = formatDateLocal(new Date());
            const minutes = Math.ceil(seconds / 60); // 秒转分钟，向上取整
            
            // 发送到服务器
            fetch('/api/settings/reading-history/record', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ minutes, date: today })
            }).then(response => {
                if (response.ok) {
                    console.log(`记录每日阅读时间到服务器: ${minutes} 分钟`);
                }
            }).catch(err => {
                console.error('记录每日阅读时间失败:', err);
            });
            
            // 同时保存到 localStorage 作为备份
            try {
                const key = 'dailyReadingData';
                let data = {};
                const saved = localStorage.getItem(key);
                if (saved) {
                    data = JSON.parse(saved);
                }
                data[today] = (data[today] || 0) + minutes;
                
                // 只保留过去 400 天的数据
                const cutoffDate = new Date();
                cutoffDate.setDate(cutoffDate.getDate() - 400);
                const cutoffStr = formatDateLocal(cutoffDate);
                Object.keys(data).forEach(date => {
                    if (date < cutoffStr) {
                        delete data[date];
                    }
                });
                localStorage.setItem(key, JSON.stringify(data));
            } catch (e) {
                console.error('保存到 localStorage 失败:', e);
            }
        }
        
        function startReadingTimer() {
            readStartTime = Date.now();
            lastRecordedSeconds = 0;
            isTimerActive = true;
            console.log('开始记录阅读时间');
            
            // 启动用户活动监控
            startActivityMonitoring();
            
            // 每30秒记录一次阅读时间（发送增量）
            readTimeInterval = setInterval(function() {
                // 只有在用户活动状态下才记录时间
                if (readStartTime && isTimerActive) {
                    const now = Date.now();
                    const elapsed = Math.floor((now - readStartTime) / 1000); // 秒
                    const incrementSeconds = elapsed - lastRecordedSeconds;
                    
                    if (incrementSeconds > 0) {
                        // 发送增量到后端记录
                        fetch(`/api/paper/${paperId}/analysis-view-time`, {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                            },
                            body: JSON.stringify({
                                increment: incrementSeconds  // 发送增量而不是累计
                            })
                        }).catch(err => console.error('记录阅读时间失败:', err));
                        
                        // 记录增量到每日阅读数据
                        recordDailyReadingTime(incrementSeconds);
                        lastRecordedSeconds = elapsed;
                    }
                }
            }, 30000); // 每30秒记录一次
        }
        
        function stopReadingTimer() {
            // 停止用户活动监控
            stopActivityMonitoring();
            
            if (readStartTime && isTimerActive) {
                // 只有在活动状态下才计算并保存时间
                const now = Date.now();
                const elapsed = Math.floor((now - readStartTime) / 1000); // 秒
                const incrementSeconds = elapsed - lastRecordedSeconds;
                console.log('停止记录阅读时间, 本次增量:', incrementSeconds, '秒');
                
                if (incrementSeconds > 0) {
                    // 发送最后的增量到后端
                    fetch(`/api/paper/${paperId}/analysis-view-time`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            increment: incrementSeconds  // 发送增量
                        })
                    }).catch(err => console.error('记录阅读时间失败:', err));
                    
                    // 记录增量到每日阅读数据
                    recordDailyReadingTime(incrementSeconds);
                }
            }
            
            readStartTime = null;
            lastRecordedSeconds = 0;
            isTimerActive = false;
            lastActivityTime = null;
            
            if (readTimeInterval) {
                clearInterval(readTimeInterval);
                readTimeInterval = null;
            }
        }
        
        setupClose();
        loadContent();
        startReadingTimer();
        
        // 页面关闭或离开时停止计时
        window.addEventListener('beforeunload', function() {
            stopReadingTimer();
        });
        
        // 页面隐藏时停止计时（切换标签页等）
        document.addEventListener('visibilitychange', function() {
            if (document.hidden) {
                stopReadingTimer();
            } else {
                startReadingTimer();
            }
        });
    </script>
</body>
</html>
