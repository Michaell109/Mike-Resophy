<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Interpretation - Resophy</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/website_logo.png') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [["$", "$"], ["\\(", "\\)"]],
                displayMath: [["$$", "$$"], ["\\[", "\\]"]]
            },
            options: {
                skipHtmlTags: ["script", "noscript", "style", "textarea", "pre"],
                processHtmlClass: "markdown-viewer"
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
    <style>
        * { 
            box-sizing: border-box; 
            margin: 0;
            padding: 0;
        }
        
        body { 
            margin: 0; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333; 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Noto Sans', sans-serif;
            min-height: 100vh;
        }
        
        .header {
            height: 64px;
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.95);
            border-bottom: 1px solid rgba(0, 0, 0, 0.08);
            display: flex;
            align-items: center;
            padding: 0;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
        }
        
        .header-content {
            width: 100%;
            padding: 0 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .header .btn { 
            padding: 10px 20px; 
            border: none; 
            background: rgba(103, 126, 234, 0.1);
            border-radius: 8px; 
            cursor: pointer; 
            display: inline-flex; 
            align-items: center; 
            gap: 8px;
            font-size: 14px;
            font-weight: 500;
            color: #667eea;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .header .btn:hover { 
            background: rgba(103, 126, 234, 0.2);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(103, 126, 234, 0.2);
        }
        
        .header .btn i {
            font-size: 16px;
        }

        .title {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .title::before {
            content: '✨';
            font-size: 24px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .chat-toggle-btn {
            background: rgba(103, 126, 234, 0.1);
            color: #667eea;
            border: none;
            border-radius: 8px;
            padding: 10px 16px;
            cursor: pointer;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-weight: 500;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .chat-toggle-btn:hover {
            background: rgba(103, 126, 234, 0.2);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(103, 126, 234, 0.2);
        }

        .chat-toggle-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .main-container {
            display: flex;
            height: calc(100vh - 64px);
        }

        .analysis-container {
            flex: 1;
            min-width: 0;
            overflow-y: auto;
            padding: 48px 32px;
            display: flex;
            align-items: flex-start;
            justify-content: center;
        }

        .content {
            width: min(900px, 100%);
            background: white;
            border-radius: 16px;
            padding: 48px 56px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            animation: fadeIn 0.5s ease-out;
            flex-shrink: 0;
            transition: width 0.15s ease, padding 0.15s ease;
        }

        .zoom-controls {
            display: flex;
            align-items: center;
            gap: 2px;
            background: rgba(103, 126, 234, 0.1);
            border-radius: 8px;
            padding: 2px;
        }

        .zoom-btn {
            background: none;
            border: none;
            color: #667eea;
            cursor: pointer;
            padding: 8px 10px;
            border-radius: 6px;
            font-size: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .zoom-btn:hover {
            background: rgba(103, 126, 234, 0.2);
        }

        .zoom-level {
            font-size: 12px;
            font-weight: 600;
            color: #667eea;
            min-width: 38px;
            text-align: center;
            user-select: none;
        }

        .font-size-select {
            background: rgba(103, 126, 234, 0.1);
            color: #667eea;
            border: none;
            border-radius: 6px;
            padding: 6px 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            outline: none;
        }

        .font-size-select:hover {
            background: rgba(103, 126, 234, 0.2);
        }

        .font-size-select option {
            background: #fff;
            color: #333;
        }

        /* Chat Sidebar */
        .chat-sidebar {
            width: 0;
            min-width: 0;
            background: #1e1e1e;
            border-left: 1px solid #444;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .chat-sidebar.open {
            width: 420px;
            min-width: 420px;
        }

        .chat-header {
            padding: 12px 16px;
            background: #252525;
            border-bottom: 1px solid #444;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .chat-header-title {
            font-size: 14px;
            font-weight: 600;
            color: #e0e0e0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .chat-header-title i {
            color: #667eea;
        }

        .chat-context-badge {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 10px;
            background: #1a472a;
            color: #4caf50;
            font-weight: 500;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .chat-message {
            max-width: 95%;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.6;
            word-wrap: break-word;
        }

        .chat-message.user {
            align-self: flex-end;
            background: #667eea;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .chat-message.assistant {
            align-self: flex-start;
            background: #333;
            color: #e0e0e0;
            border-bottom-left-radius: 4px;
        }

        .chat-message.assistant .md-content h1,
        .chat-message.assistant .md-content h2,
        .chat-message.assistant .md-content h3 {
            margin: 8px 0 4px;
            color: #fff;
            font-size: 15px;
        }

        .chat-message.assistant .md-content p {
            margin: 4px 0;
        }

        .chat-message.assistant .md-content code {
            background: #444;
            padding: 1px 4px;
            border-radius: 3px;
            font-size: 13px;
        }

        .chat-message.assistant .md-content pre {
            background: #1a1a1a;
            padding: 10px;
            border-radius: 6px;
            overflow-x: auto;
            margin: 8px 0;
        }

        .chat-message.assistant .md-content pre code {
            background: none;
            padding: 0;
        }

        .chat-message.assistant .md-content ul,
        .chat-message.assistant .md-content ol {
            margin: 4px 0;
            padding-left: 20px;
        }

        .chat-message.assistant .md-content li {
            margin: 2px 0;
        }

        .chat-message.assistant .md-content strong {
            color: #fff;
        }

        .chat-message.error {
            align-self: center;
            background: #4a2020;
            color: #ff6b6b;
            font-size: 13px;
            text-align: center;
        }

        .chat-message .typing-cursor {
            display: inline-block;
            width: 2px;
            height: 16px;
            background: #667eea;
            animation: blink 0.7s infinite;
            vertical-align: text-bottom;
            margin-left: 2px;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        .chat-welcome {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            color: #888;
            padding: 20px;
        }

        .chat-welcome i {
            font-size: 48px;
            margin-bottom: 16px;
            color: #555;
        }

        .chat-welcome p {
            font-size: 14px;
            line-height: 1.6;
            margin: 4px 0;
        }

        .chat-input-area {
            padding: 12px 16px;
            background: #252525;
            border-top: 1px solid #444;
        }

        .chat-input-wrapper {
            display: flex;
            gap: 8px;
            align-items: flex-end;
        }

        .chat-input {
            flex: 1;
            background: #333;
            border: 1px solid #555;
            border-radius: 8px;
            padding: 10px 14px;
            color: #e0e0e0;
            font-size: 14px;
            font-family: inherit;
            resize: none;
            outline: none;
            max-height: 120px;
            min-height: 40px;
            line-height: 1.5;
        }

        .chat-input:focus {
            border-color: #667eea;
        }

        .chat-input::placeholder {
            color: #777;
        }

        .chat-send-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 10px 14px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            min-width: 40px;
            height: 40px;
        }

        .chat-send-btn:hover {
            opacity: 0.9;
        }

        .chat-send-btn:disabled {
            background: #555;
            cursor: not-allowed;
        }

        .chat-clear-btn {
            background: none;
            border: none;
            color: #888;
            cursor: pointer;
            font-size: 14px;
            padding: 4px;
            border-radius: 4px;
        }

        .chat-clear-btn:hover {
            color: #ff6b6b;
            background: #333;
        }

        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: #555;
            border-radius: 3px;
        }

        .chat-messages::-webkit-scrollbar-thumb:hover {
            background: #777;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* Markdown Style optimization */
        .markdown-viewer h1 { 
            font-size: 2.5em; 
            margin-bottom: 0.5em;
            margin-top: 0;
            color: #1a202c;
            font-weight: 800;
            line-height: 1.2;
            border-bottom: 3px solid #667eea;
            padding-bottom: 0.3em;
        }
        
        .markdown-viewer h2 { 
            font-size: 2em; 
            margin-top: 1.5em;
            margin-bottom: 0.5em;
            color: #2d3748;
            font-weight: 700;
            line-height: 1.3;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 0.3em;
        }
        
        .markdown-viewer h3 { 
            font-size: 1.5em; 
            margin-top: 1.2em;
            margin-bottom: 0.5em;
            color: #4a5568;
            font-weight: 600;
        }
        
        .markdown-viewer h4 {
            font-size: 1.25em;
            margin-top: 1em;
            margin-bottom: 0.5em;
            color: #718096;
            font-weight: 600;
        }
        
        .markdown-viewer p {
            line-height: 1.8;
            margin-bottom: 1.2em;
            color: #2d3748;
            font-size: 1em;
        }
        
        .markdown-viewer ul, .markdown-viewer ol {
            margin-left: 1.5em;
            margin-bottom: 1.2em;
            line-height: 1.8;
        }
        
        .markdown-viewer li {
            margin-bottom: 0.5em;
            color: #2d3748;
        }
        
        .markdown-viewer code { 
            padding: 0.2em 0.5em; 
            background: linear-gradient(135deg, rgba(103, 126, 234, 0.1), rgba(118, 75, 162, 0.1));
            border: 1px solid rgba(103, 126, 234, 0.2);
            border-radius: 4px;
            font-family: 'Fira Code', 'Monaco', 'Consolas', monospace;
            font-size: 0.9em;
            color: #667eea;
            font-weight: 500;
        }
        
        .markdown-viewer pre { 
            padding: 20px; 
            background: #1a202c;
            border-radius: 12px; 
            overflow: auto;
            margin-bottom: 1.5em;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
            border: 1px solid #2d3748;
        }
        
        .markdown-viewer pre code {
            background: none;
            border: none;
            color: #e2e8f0;
            padding: 0;
            font-size: 0.875em;
        }
        
        .markdown-viewer img { 
            max-width: 100%; 
            height: auto; 
            border-radius: 12px; 
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
            margin: 1.5em 0;
            transition: transform 0.3s ease;
        }
        
        .markdown-viewer img:hover {
            transform: scale(1.02);
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.15);
        }
        
        .markdown-viewer blockquote {
            margin: 1.5em 0;
            padding: 1em 1.5em;
            border-left: 4px solid #667eea;
            background: rgba(103, 126, 234, 0.05);
            border-radius: 0 8px 8px 0;
            color: #4a5568;
            font-style: italic;
        }
        
        .markdown-viewer table {
            width: 100%;
            border-collapse: collapse;
            margin: 1.5em 0;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            border-radius: 8px;
            overflow: hidden;
        }
        
        .markdown-viewer th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px;
            text-align: left;
            font-weight: 600;
        }
        
        .markdown-viewer td {
            padding: 12px;
            border-bottom: 1px solid #e2e8f0;
        }
        
        .markdown-viewer tr:hover {
            background: rgba(103, 126, 234, 0.05);
        }
        
        .markdown-viewer a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
            border-bottom: 2px solid transparent;
            transition: border-color 0.3s ease;
        }
        
        .markdown-viewer a:hover {
            border-bottom-color: #667eea;
        }
        
        .markdown-viewer hr {
            border: none;
            height: 2px;
            background: linear-gradient(90deg, transparent, #e2e8f0, transparent);
            margin: 2em 0;
        }

        .markdown-viewer .algorithm-block {
            padding: 20px;
            background: #f7fafc;
            border-radius: 12px;
            overflow: auto;
            margin-bottom: 1.5em;
            border: 1px solid #e2e8f0;
            font-family: 'Fira Code', 'Monaco', 'Consolas', monospace;
            font-size: 0.875em;
            line-height: 1.8;
            white-space: pre-wrap;
            color: #2d3748;
        }
        
        .loading { 
            height: 100vh; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
            color: white;
            font-size: 18px;
        }
        
        .loading::before {
            content: '';
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }
        
        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.05);
        }
        
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 5px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(135deg, #5568d3 0%, #653a8b 100%);
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <button id="close-btn" class="btn" title="Close current tab (Ctrl+W / Esc)">
                <i class="fas fa-arrow-left"></i> Back
            </button>
            <div class="title">AI Analysis Reader</div>
            <div class="header-right">
                <div class="zoom-controls">
                    <button id="zoom-out-btn" class="zoom-btn" title="Zoom out"><i class="fas fa-minus"></i></button>
                    <span id="zoom-level" class="zoom-level">140%</span>
                    <button id="zoom-in-btn" class="zoom-btn" title="Zoom in"><i class="fas fa-plus"></i></button>
                </div>
                <select id="font-size-select" class="font-size-select" title="Font size">
                    <option value="15">15px</option>
                    <option value="16" selected>16px</option>
                    <option value="18">18px</option>
                    <option value="20">20px</option>
                    <option value="24">24px</option>
                </select>
                <button id="chat-toggle-btn" class="chat-toggle-btn active" title="Toggle chat sidebar">
                    <i class="fas fa-comments"></i> Chat
                </button>
            </div>
        </div>
    </div>
    <div id="loading" class="loading">Loading AI analysis...</div>
    <div class="main-container" id="main-container" style="display:none;">
        <div class="analysis-container">
            <div class="content">
                <div id="md" class="markdown-viewer"></div>
            </div>
        </div>
        <div class="chat-sidebar open" id="chat-sidebar">
            <div class="chat-header">
                <div class="chat-header-title">
                    <i class="fas fa-comments"></i>
                    <span>Paper Q&A</span>
                    <span class="chat-context-badge" id="chat-context-badge" style="display:none;">Paper loaded</span>
                </div>
                <button class="chat-clear-btn" id="chat-clear-btn" title="Clear conversation">
                    <i class="fas fa-trash-alt"></i>
                </button>
            </div>
            <div class="chat-messages" id="chat-messages">
                <div class="chat-welcome" id="chat-welcome">
                    <i class="fas fa-robot"></i>
                    <p>Ask questions about this paper</p>
                    <p style="font-size: 12px; color: #666; margin-top: 8px;">
                        The AI analysis result is used as context.<br>
                        Ask about any part of the analysis.
                    </p>
                </div>
            </div>
            <div class="chat-input-area">
                <div class="chat-input-wrapper">
                    <textarea
                        class="chat-input"
                        id="chat-input"
                        placeholder="Ask about this paper..."
                        rows="1"
                    ></textarea>
                    <button class="chat-send-btn" id="chat-send-btn" title="Send message">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>
    <script>
        const paperId = {{ paper_id|tojson }};

        function convertAlgorithmCodeBlocks(text) {
            var latexCommand = /\\(?:frac|sum|prod|int|sqrt|cdot|times|alpha|beta|gamma|delta|epsilon|theta|lambda|mu|sigma|tau|omega|phi|psi|pi|infty|partial|nabla|text|mathrm|mathbf|mathcal|mathbb|mathit|left|right|bigl|bigr|quad|qquad|label|eqref|hat|bar|vec|tilde|overline|underline|xrightarrow|xleftarrow|lim|log|sin|cos|exp|tag|begin|end|nonumber|centering|mathscr|operatorname|boldsymbol|overset|underset|mathring|breve|check|dot|ddot)/;

            return text.replace(/```([a-zA-Z0-9]*)\n([\s\S]*?)```/g, function(match, lang, code) {
                if (!(/\$[^$]+\$/.test(code) && latexCommand.test(code))) {
                    return match;
                }

                var lines = code.split('\n');
                var htmlLines = [];
                for (var i = 0; i < lines.length; i++) {
                    var line = lines[i];
                    line = line.replace(/&/g, '&amp;')
                               .replace(/</g, '&lt;')
                               .replace(/>/g, '&gt;');
                    htmlLines.push(line);
                }

                return '<div class="algorithm-block">\n' + htmlLines.join('<br>\n') + '\n</div>';
            });
        }

        function wrapLatexDelimiters(text) {
            var latexCommand = /\\(?:frac|sum|prod|int|sqrt|cdot|times|alpha|beta|gamma|delta|epsilon|theta|lambda|mu|sigma|tau|omega|phi|psi|pi|infty|partial|nabla|text|mathrm|mathbf|mathcal|mathbb|mathit|left|right|bigl|bigr|quad|qquad|label|eqref|hat|bar|vec|tilde|overline|underline|xrightarrow|xleftarrow|lim|log|sin|cos|exp|tag|begin|end|nonumber|centering)/;
            var subSuper = /[_^]\{[^}]+\}/;

            var lines = text.split('\n');
            var result = [];
            var inDisplayMath = false;

            for (var i = 0; i < lines.length; i++) {
                var line = lines[i];
                var trimmed = line.trim();

                if (trimmed === '$$') {
                    inDisplayMath = !inDisplayMath;
                    result.push(line);
                    continue;
                }

                if (inDisplayMath) {
                    result.push(line);
                    continue;
                }

                if (!trimmed || trimmed.startsWith('#') || trimmed.startsWith('!') ||
                    trimmed.startsWith('```') || trimmed.startsWith('>') ||
                    trimmed.startsWith('- ') || trimmed.startsWith('* ') ||
                    /^\d+\.\s/.test(trimmed)) {
                    result.push(line);
                    continue;
                }

                if (/\$[^$]+\$/.test(trimmed) || /\$\$[\s\S]*?\$\$/.test(trimmed)) {
                    result.push(line);
                    continue;
                }

                var lineHasLatex = latexCommand.test(trimmed) || subSuper.test(trimmed);
                if (!lineHasLatex) {
                    result.push(line);
                    continue;
                }

                var withoutLatex = trimmed
                    .replace(/\\[a-zA-Z]+(\{[^}]*\})?/g, '')
                    .replace(/[_^]\{[^}]*\}/g, '')
                    .replace(/[=+\-*/|,.\s\[\]\(\)\{\}\\~!@#$%&?;:'"]/g, '');
                var isDisplayMath = withoutLatex.length <= Math.max(trimmed.length * 0.25, 8);

                if (isDisplayMath) {
                    result.push('$$' + trimmed + '$$');
                    continue;
                }

                var processedLine = line;
                var cjkBoundary = /[\u4e00-\u9fff\uff0c\u3002\uff1b\uff1a\uff01\uff1f\u201c\u201d\uff08\uff09\u3000]{2,}/;
                var segments = processedLine.split(cjkBoundary);
                var separators = processedLine.match(cjkBoundary) || [];

                var rebuilt = '';
                for (var s = 0; s < segments.length; s++) {
                    var seg = segments[s];
                    if (latexCommand.test(seg) || subSuper.test(seg)) {
                        var leading = seg.match(/^(\s*)/)[1];
                        var trailing = seg.match(/(\s*)$/)[1];
                        var core = seg.slice(leading.length, seg.length - trailing.length);
                        if (core.length > 2) {
                            seg = leading + '$' + core + '$' + trailing;
                        }
                    }
                    rebuilt += seg;
                    if (s < separators.length) {
                        rebuilt += separators[s];
                    }
                }
                result.push(rebuilt);
            }

            return result.join('\n');
        }

        function protectLatexSubSuper(text) {
            text = text.replace(/_\{/g, '\u204FSUB\u204F{');
            text = text.replace(/\^\{/g, '\u204FSUP\u204F{');
            text = text.replace(/_(?=[a-zA-Z0-9])/g, '\u204FSUB\u204F');
            text = text.replace(/\^(?=[a-zA-Z0-9])/g, '\u204FSUP\u204F');
            return text;
        }

        function restoreLatexSubSuper(html) {
            html = html.replace(/\u204FSUB\u204F/g, '_');
            html = html.replace(/\u204FSUP\u204F/g, '^');
            return html;
        }

        function typesetMathJax(el, maxRetries) {
            maxRetries = maxRetries || 5;
            if (!el) return;
            var tryTypeset = function(attempt) {
                if (attempt > maxRetries) {
                    console.warn('MathJax: gave up after', maxRetries, 'retries');
                    return;
                }
                if (window.MathJax && MathJax.typesetPromise) {
                    var ready = (MathJax.startup && MathJax.startup.promise)
                        ? MathJax.startup.promise
                        : Promise.resolve();
                    ready.then(function() {
                        if (MathJax.typesetClear) {
                            MathJax.typesetClear([el]);
                        }
                        MathJax.typesetPromise([el]).catch(function(err) {
                            console.warn('MathJax typesetPromise error:', err);
                        });
                    });
                } else if (window.MathJax && MathJax.typeset) {
                    MathJax.Hub.Queue(['Typeset', MathJax.Hub, el]);
                } else {
                    var delay = 300 * Math.pow(1.5, attempt);
                    console.log('MathJax not ready, retrying in ' + Math.round(delay) + 'ms (attempt ' + (attempt + 1) + ')');
                    setTimeout(function() { tryTypeset(attempt + 1); }, delay);
                }
            };
            tryTypeset(0);
        }

        function rewriteImages(markdown) {
            const imageRegex = /!\[([^\]]*)\]\(([^)]+)\)/g;
            return markdown.replace(imageRegex, (match, alt, src) => {
                if (!src.startsWith('http') && !src.startsWith('/')) {
                    const encodedPath = encodeURIComponent(src);
                    return `![${alt}](/api/paper/${paperId}/analysis/image?path=${encodedPath})`;
                }
                return match;
            });
        }

        function renderMarkdown(mdText) {
            if (typeof marked !== 'undefined') {
                marked.setOptions({
                    breaks: true,
                    gfm: true,
                    highlight: function(code, lang) {
                        if (typeof hljs !== 'undefined' && lang) {
                            try { return hljs.highlight(code, { language: lang }).value; }
                            catch (e) { return hljs.highlightAuto(code).value; }
                        }
                        return code;
                    }
                });
                // Convert algorithm code blocks to HTML divs for math rendering
                mdText = convertAlgorithmCodeBlocks(mdText);
                // Wrap bare LaTeX formulas before rendering
                mdText = wrapLatexDelimiters(mdText);
                const preserved = [];
                const mdPreserved = mdText.replace(/\$\$([\s\S]*?)\$\$/g, function(match) {
                    const id = preserved.length;
                    preserved.push(match);
                    return `@@MJXB${id}@@`;
                }).replace(/(?<!\\)\$([^\n$]+)\$/g, function(match) {
                    const id = preserved.length;
                    preserved.push(match);
                    return `@@MJXI${id}@@`;
                });
                let html = marked.parse(protectLatexSubSuper(mdPreserved));
                html = restoreLatexSubSuper(html);
                html = html.replace(/@@MJXB(\d+)@@/g, function(_, idx) {
                    return preserved[Number(idx)];
                }).replace(/@@MJXI(\d+)@@/g, function(_, idx) {
                    return preserved[Number(idx)];
                });
                const el = document.getElementById('md');
                el.innerHTML = html;
                if (typeof hljs !== 'undefined') {
                    document.querySelectorAll('pre code').forEach((block) => hljs.highlightElement(block));
                }
                typesetMathJax(el);
            } else {
                document.getElementById('md').innerHTML = `<pre style="white-space: pre-wrap;">${mdText}</pre>`;
            }
        }

        async function loadContent() {
            try {
                const res = await fetch(`/api/paper/${paperId}/analysis/result`);
                const json = await res.json();
                if (!res.ok || !json.success) throw new Error(json.error || 'Failed to load');
                const md = rewriteImages(json.content || '');
                renderMarkdown(md);
                document.getElementById('loading').style.display = 'none';
                document.getElementById('main-container').style.display = 'flex';
                hasPaperContext = !!json.content;
                updateContextBadge();
            } catch (e) {
                document.getElementById('loading').textContent = `Failed to load: ${e.message}`;
            }
        }

        function setupClose() {
            const btn = document.getElementById('close-btn');
            btn.onclick = () => { window.close(); };
            window.addEventListener('keydown', (e) => {
                if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'w') {
                    e.preventDefault(); window.close();
                } else if (e.key === 'Escape') {
                    e.preventDefault(); window.close();
                }
            });
        }

        // Record reading time
        let readStartTime = null;
        let readTimeInterval = null;
        let lastRecordedSeconds = 0; // Record the number of seconds last recorded
        let lastActivityTime = null; // Last user activity time
        let isTimerActive = true; // Whether the timer is activated (used to distinguish user inactivity)
        let activityCheckInterval = null; // Activity detection timer
        const INACTIVITY_THRESHOLD = 60000; // No activity threshold:1Minutes (milliseconds)
        
        // Format the date as YYYY-MM-DD(Use local time to avoid time zone issues)
        function formatDateLocal(date) {
            const d = date || new Date();
            const year = d.getFullYear();
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }
        
        // Log user activity
        function recordUserActivity() {
            const now = Date.now();
            const wasInactive = !isTimerActive;
            lastActivityTime = now;
            
            // If it was inactive before and is now active, the timing needs to be restarted.
            if (wasInactive) {
                console.log('User activity detected, timer resumed');
                isTimerActive = true;
                // Reset the starting point of timing, but keep the number of recorded seconds
                readStartTime = now;
            }
        }
        
        // Detect if the user has been inactive for a long time
        function checkUserActivity() {
            if (!lastActivityTime || !isTimerActive) {
                return;
            }
            
            const now = Date.now();
            const timeSinceLastActivity = now - lastActivityTime;
            
            // If the threshold is exceeded and the timer is still active, the timing is paused
            if (timeSinceLastActivity > INACTIVITY_THRESHOLD && isTimerActive) {
                console.log('Detected user inactivity for more than1minutes, pause timing');
                isTimerActive = false;
                // Save current reading time
                if (readStartTime) {
                    const elapsed = Math.floor((lastActivityTime - readStartTime) / 1000); // Use last active time
                    const incrementSeconds = elapsed - lastRecordedSeconds;
                    
                    if (incrementSeconds > 0) {
                        console.log('Save reading time before inactivity:', incrementSeconds, 'Second');
                        // Send delta to backend
                        fetch(`/api/paper/${paperId}/analysis-view-time`, {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                            },
                            body: JSON.stringify({
                                increment: incrementSeconds
                            })
                        }).catch(err => console.error('Failed to record reading time:', err));
                        
                        // Record daily reading data
                        recordDailyReadingTime(incrementSeconds);
                        lastRecordedSeconds += incrementSeconds;
                    }
                }
            }
        }
        
        // Start user activity monitoring
        function startActivityMonitoring() {
            // Monitor various user activity events
            const activityEvents = ['mousemove', 'mousedown', 'keydown', 'scroll', 'touchstart', 'click'];
            
            activityEvents.forEach(eventType => {
                document.addEventListener(eventType, recordUserActivity, { passive: true });
            });
            
            // Initialize last activity time
            lastActivityTime = Date.now();
            isTimerActive = true;
            
            // Every10Check user activity status once every second
            activityCheckInterval = setInterval(checkUserActivity, 10000);
            
            console.log('User activity monitoring is started');
        }
        
        // Stop user activity monitoring
        function stopActivityMonitoring() {
            if (activityCheckInterval) {
                clearInterval(activityCheckInterval);
                activityCheckInterval = null;
            }
            console.log('User activity monitoring has stopped');
        }
        
        // Record daily reading time to the server (also save to localStorage as backup)
        function recordDailyReadingTime(seconds) {
            if (seconds <= 0) return;
            
            const today = formatDateLocal(new Date());
            const minutes = Math.ceil(seconds / 60); // Seconds to minutes, rounded up
            
            // Send to server
            fetch('/api/settings/reading-history/record', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ minutes, date: today })
            }).then(response => {
                if (response.ok) {
                    console.log(`Record daily reading time to the server: ${minutes} minute`);
                }
            }).catch(err => {
                console.error('Failed to record daily reading time:', err);
            });
            
            // Also save to localStorage as backup
            try {
                const key = 'dailyReadingData';
                let data = {};
                const saved = localStorage.getItem(key);
                if (saved) {
                    data = JSON.parse(saved);
                }
                data[today] = (data[today] || 0) + minutes;
                
                // only keep the past 400 days of data
                const cutoffDate = new Date();
                cutoffDate.setDate(cutoffDate.getDate() - 400);
                const cutoffStr = formatDateLocal(cutoffDate);
                Object.keys(data).forEach(date => {
                    if (date < cutoffStr) {
                        delete data[date];
                    }
                });
                localStorage.setItem(key, JSON.stringify(data));
            } catch (e) {
                console.error('save to localStorage fail:', e);
            }
        }
        
        function startReadingTimer() {
            readStartTime = Date.now();
            lastRecordedSeconds = 0;
            isTimerActive = true;
            console.log('Start recording reading time');
            
            // Enable user activity monitoring
            startActivityMonitoring();
            
            // Every30Record reading time every second (send increment)
            readTimeInterval = setInterval(function() {
                // Only record time when user is active
                if (readStartTime && isTimerActive) {
                    const now = Date.now();
                    const elapsed = Math.floor((now - readStartTime) / 1000); // Second
                    const incrementSeconds = elapsed - lastRecordedSeconds;
                    
                    if (incrementSeconds > 0) {
                        // Send delta to backend record
                        fetch(`/api/paper/${paperId}/analysis-view-time`, {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                            },
                            body: JSON.stringify({
                                increment: incrementSeconds  // Send delta instead of cumulative
                            })
                        }).catch(err => console.error('Failed to record reading time:', err));
                        
                        // Record increments to daily reading data
                        recordDailyReadingTime(incrementSeconds);
                        lastRecordedSeconds = elapsed;
                    }
                }
            }, 30000); // Every30Record once every second
        }
        
        function stopReadingTimer() {
            // Stop user activity monitoring
            stopActivityMonitoring();
            
            if (readStartTime && isTimerActive) {
                // Calculate and save time only when active
                const now = Date.now();
                const elapsed = Math.floor((now - readStartTime) / 1000); // Second
                const incrementSeconds = elapsed - lastRecordedSeconds;
                console.log('Stop recording reading time, This increment:', incrementSeconds, 'Second');
                
                if (incrementSeconds > 0) {
                    // Send the final increment to the backend
                    fetch(`/api/paper/${paperId}/analysis-view-time`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            increment: incrementSeconds  // Send delta
                        })
                    }).catch(err => console.error('Failed to record reading time:', err));
                    
                    // Record increments to daily reading data
                    recordDailyReadingTime(incrementSeconds);
                }
            }
            
            readStartTime = null;
            lastRecordedSeconds = 0;
            isTimerActive = false;
            lastActivityTime = null;
            
            if (readTimeInterval) {
                clearInterval(readTimeInterval);
                readTimeInterval = null;
            }
        }
        
        setupClose();
        loadContent();
        startReadingTimer();

        // ========================================
        // Chat functionality (same API as pdf_viewer)
        // ========================================
        let chatMessages = [];
        let isChatStreaming = false;
        let hasPaperContext = false;

        function updateContextBadge() {
            const badge = document.getElementById('chat-context-badge');
            if (!badge) return;
            badge.style.display = 'inline-block';
            if (hasPaperContext) {
                badge.textContent = 'Paper loaded';
                badge.className = 'chat-context-badge';
            } else {
                badge.textContent = 'No analysis';
                badge.className = 'chat-context-badge no-context';
            }
        }

        function setupChat() {
            const toggleBtn = document.getElementById('chat-toggle-btn');
            const sidebar = document.getElementById('chat-sidebar');
            const input = document.getElementById('chat-input');
            const sendBtn = document.getElementById('chat-send-btn');
            const clearBtn = document.getElementById('chat-clear-btn');

            toggleBtn.addEventListener('click', function() {
                sidebar.classList.toggle('open');
                toggleBtn.classList.toggle('active');
                if (sidebar.classList.contains('open')) {
                    input.focus();
                }
            });

            sendBtn.addEventListener('click', sendChatMessage);

            input.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendChatMessage();
                }
            });

            input.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = Math.min(this.scrollHeight, 120) + 'px';
            });

            clearBtn.addEventListener('click', clearChat);
        }

        function clearChat() {
            chatMessages = [];
            const messagesEl = document.getElementById('chat-messages');
            messagesEl.innerHTML = '<div class="chat-welcome" id="chat-welcome"><i class="fas fa-robot"></i><p>Ask questions about this paper</p><p style="font-size: 12px; color: #666; margin-top: 8px;">The AI analysis result is used as context.<br>Ask about any part of the analysis.</p></div>';
        }

        async function sendChatMessage() {
            if (isChatStreaming) return;

            const input = document.getElementById('chat-input');
            const message = input.value.trim();
            if (!message) return;

            const welcome = document.getElementById('chat-welcome');
            if (welcome) welcome.remove();

            chatMessages.push({ role: 'user', content: message });
            appendMessageToUI('user', message);

            input.value = '';
            input.style.height = 'auto';

            isChatStreaming = true;
            document.getElementById('chat-send-btn').disabled = true;

            const assistantEl = appendMessageToUI('assistant', '');
            const mdContentEl = assistantEl.querySelector('.md-content') || assistantEl;

            try {
                const response = await fetch('/api/paper/' + paperId + '/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages: chatMessages })
                });

                if (!response.ok) {
                    const errorData = await response.json().catch(function() { return {}; });
                    throw new Error(errorData.error || 'Request failed');
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let fullContent = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value, { stream: true });
                    const lines = chunk.split('\n');

                    for (var i = 0; i < lines.length; i++) {
                        var line = lines[i].trim();
                        if (!line.startsWith('data: ')) continue;
                        var data = line.slice(6);

                        if (data === '[DONE]') break;

                        try {
                            var parsed = JSON.parse(data);
                            if (parsed.error) {
                                throw new Error(parsed.error);
                            }
                            if (parsed.content) {
                                fullContent += parsed.content;
                                if (typeof marked !== 'undefined') {
                                    mdContentEl.innerHTML = '<div class="md-content">' + marked.parse(fullContent) + '<span class="typing-cursor"></span></div>';
                                } else {
                                    mdContentEl.textContent = fullContent + '|';
                                }
                                var chatMessagesEl = document.getElementById('chat-messages');
                                chatMessagesEl.scrollTop = chatMessagesEl.scrollHeight;
                            }
                        } catch (e) {
                            if (e.message && !e.message.includes('JSON')) {
                                throw e;
                            }
                        }
                    }
                }

                chatMessages.push({ role: 'assistant', content: fullContent });
                if (typeof marked !== 'undefined') {
                    mdContentEl.innerHTML = '<div class="md-content">' + marked.parse(fullContent) + '</div>';
                } else {
                    mdContentEl.textContent = fullContent;
                }

            } catch (error) {
                console.error('Chat error:', error);
                mdContentEl.innerHTML = '<div style="color: #ff6b6b;"><i class="fas fa-exclamation-circle"></i> ' + escapeHtml(error.message) + '</div>';
            } finally {
                isChatStreaming = false;
                document.getElementById('chat-send-btn').disabled = false;
                input.focus();
            }
        }

        function appendMessageToUI(role, content) {
            var messagesEl = document.getElementById('chat-messages');
            var msgEl = document.createElement('div');
            msgEl.className = 'chat-message ' + role;

            if (role === 'assistant') {
                if (typeof marked !== 'undefined' && content) {
                    msgEl.innerHTML = '<div class="md-content">' + marked.parse(content) + '</div>';
                } else {
                    msgEl.textContent = content;
                }
            } else {
                msgEl.textContent = content;
            }

            messagesEl.appendChild(msgEl);
            messagesEl.scrollTop = messagesEl.scrollHeight;
            return msgEl;
        }

        function escapeHtml(text) {
            var div = document.createElement('div');
            div.appendChild(document.createTextNode(text));
            return div.innerHTML;
        }

        // ========================================
        // Zoom & Font size functionality
        // ========================================
        const BASE_WIDTH = 900;
        const BASE_PAD_X = 56;
        const BASE_PAD_Y = 48;
        let zoomLevel = 140;

        function applyZoom(level) {
            zoomLevel = Math.max(60, Math.min(200, level));
            const content = document.querySelector('.content');
            if (content) {
                const scale = zoomLevel / 100;
                content.style.width = 'min(' + Math.round(BASE_WIDTH * scale) + 'px, 100%)';
                content.style.padding = Math.round(BASE_PAD_Y * scale) + 'px ' + Math.round(BASE_PAD_X * scale) + 'px';
            }
            document.getElementById('zoom-level').textContent = zoomLevel + '%';
            try { localStorage.setItem('resophy-analysis-zoom', zoomLevel); } catch(e) {}
        }

        function setupZoom() {
            const saved = localStorage.getItem('resophy-analysis-zoom');
            if (saved) {
                zoomLevel = parseInt(saved, 10);
                if (isNaN(zoomLevel)) zoomLevel = 140;
            }

            const scrollContainer = document.querySelector('.analysis-container');

            document.getElementById('zoom-in-btn').addEventListener('click', function() {
                const prevZoom = zoomLevel;
                const scrollTop = scrollContainer.scrollTop;
                const viewportHeight = scrollContainer.clientHeight;
                const scrollRatio = scrollTop / (scrollContainer.scrollHeight - viewportHeight || 1);
                applyZoom(zoomLevel + 10);
                requestAnimationFrame(function() {
                    const newMaxScroll = scrollContainer.scrollHeight - viewportHeight;
                    scrollContainer.scrollTop = scrollRatio * newMaxScroll;
                });
            });
            document.getElementById('zoom-out-btn').addEventListener('click', function() {
                const scrollContainer2 = document.querySelector('.analysis-container');
                const scrollTop = scrollContainer2.scrollTop;
                const viewportHeight = scrollContainer2.clientHeight;
                const scrollRatio = scrollTop / (scrollContainer2.scrollHeight - viewportHeight || 1);
                applyZoom(zoomLevel - 10);
                requestAnimationFrame(function() {
                    const newMaxScroll = scrollContainer2.scrollHeight - viewportHeight;
                    scrollContainer2.scrollTop = scrollRatio * newMaxScroll;
                });
            });

            document.addEventListener('keydown', function(e) {
                if ((e.ctrlKey || e.metaKey) && (e.key === '=' || e.key === '+')) {
                    e.preventDefault();
                    document.getElementById('zoom-in-btn').click();
                } else if ((e.ctrlKey || e.metaKey) && e.key === '-') {
                    e.preventDefault();
                    document.getElementById('zoom-out-btn').click();
                } else if ((e.ctrlKey || e.metaKey) && e.key === '0') {
                    e.preventDefault();
                    applyZoom(140);
                }
            });

            applyZoom(zoomLevel);
        }

        // Font size control
        function setupFontSize() {
            var select = document.getElementById('font-size-select');
            var viewer = document.getElementById('md');
            var saved = localStorage.getItem('resophy-analysis-fontsize');
            if (saved && select.querySelector('option[value="' + saved + '"]')) {
                select.value = saved;
                viewer.style.fontSize = saved + 'px';
            }
            select.addEventListener('change', function() {
                var size = this.value;
                viewer.style.fontSize = size + 'px';
                try { localStorage.setItem('resophy-analysis-fontsize', size); } catch(e) {}
                if (viewer.innerHTML) typesetMathJax(viewer);
            });
        }

        setupZoom();
        setupFontSize();
        setupChat();
        
        // Stop timing when page is closed or navigated away
        window.addEventListener('beforeunload', function() {
            stopReadingTimer();
        });
        
        // Stop timing when page is hidden (switching tabs, etc.)
        document.addEventListener('visibilitychange', function() {
            if (document.hidden) {
                stopReadingTimer();
            } else {
                startReadingTimer();
            }
        });

        // MathJax CDN fallback
        (function() {
            setTimeout(function() {
                if (typeof MathJax === 'undefined') {
                    console.warn('MathJax not loaded from primary CDN, trying fallbacks...');
                    var urls = [
                        'https://cdn.bootcdn.net/ajax/libs/mathjax/3/es5/tex-chtml.js',
                        'https://unpkg.com/mathjax@3/es5/tex-chtml.js'
                    ];
                    var tryLoad = function(idx) {
                        if (idx >= urls.length) {
                            console.error('All MathJax CDN sources failed');
                            return;
                        }
                        var s = document.createElement('script');
                        s.src = urls[idx];
                        s.async = false;
                        s.onload = function() {
                            console.log('MathJax loaded from fallback:', urls[idx]);
                            // Re-typeset if content is already rendered
                            var el = document.getElementById('md');
                            if (el && el.innerHTML) typesetMathJax(el);
                        };
                        s.onerror = function() { tryLoad(idx + 1); };
                        document.head.appendChild(s);
                    };
                    tryLoad(0);
                }
            }, 2000);
        })();
    </script>
